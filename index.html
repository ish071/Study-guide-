OS\u2019s built-in backup tool that automatically saves copies of your files and system settings. If you accidentally delete a file or something goes wrong, you can \u201cgo back in time\u201d to recover it. It\u2019s especially helpful when troubleshooting or setting up a new device from an old backup."],["Where are most installed applications stored on macOS?",["/System","/Users","/Applications","/Library"],2,"Most apps you install on macOS are saved in the /Applications folder. This central location makes it easy to find, launch, and manage your software. You can access it quickly using Finder or by using Spotlight search."],["Which macOS feature syncs your files across all Apple devices?",["Finder","Keychain","iCloud","FileVault"],2,"iCloud is Apple\u2019s cloud storage service that keeps your photos, documents, and other files updated across all your Apple devices. When you save something to iCloud, it becomes available on your iPhone, iPad, and other Macs signed in with the same Apple ID. It\u2019s useful for backups and accessing your work from anywhere."],["A technician receives a ticket stating that a user\u2019s computer restarts every time it reaches the Windows logo. Which of the following is the most likely cause?",["Corrupt display driver","Incorrect time in BIOS","Boot loop caused by system file corruption","Dead CMOS battery"],2,"A boot loop that starts at or after the Windows logo is often caused by corrupted system files or failed updates. This issue can typically be resolved through Windows Recovery options like System Restore or Startup Repair."],["Which of the following actions would be the most appropriate first step if a computer powers on but displays a black screen after POST?",["Replace the power supply","Reset Windows","Test the hard drive using chkdsk","Boot with only the primary monitor connected"],3,"A black screen with no error after POST can indicate a display output issue, especially if multiple monitors are connected. The system may be sending video to the wrong display. Disconnecting secondary monitors helps determine if the output is going to the correct screen."],["A user reports that their Mac won\u2019t boot past the Apple logo. They recently installed a new external hard drive. What should the technician try first?",["Reinstall macOS","Disconnect the external hard drive and reboot","Run Disk Utility from Recovery Mode","Perform a PRAM reset"],1,"External drives can sometimes interfere with the boot sequence, especially if the Mac tries to boot from an unrecognized or unbootable device. Disconnecting the drive and rebooting allows the system to fall back to the internal drive as the primary boot source."],["What device sends data to all connected devices?",["Switch","Router","Hub","Bridge"],2,"A hub is a basic networking device that sends incoming data to all ports, regardless of which device actually needs the data. This can lead to unnecessary traffic and reduced network efficiency. Unlike a switch, which sends data only to the intended recipient, a hub does not filter or direct traffic intelligently."],["Which network type is used for connecting smartwatches to phones?",["LAN","WAN","PAN","MAN"],2,"A Personal Area Network (PAN) is a very small network, typically used to connect devices within a few feet of each other\u2014like a smartwatch and a phone via Bluetooth. It\u2019s designed for short-range communication and often involves only one person\u2019s devices."],["What is the main advantage of a star topology?",["Simple to troubleshoot","Connects globally","Less expensive","High redundancy"],0,"In a star topology, all devices connect to a central switch or hub, making it easier to locate and isolate network problems. If one device or cable fails, the rest of the network stays operational, which simplifies both troubleshooting and maintenance. It also allows for easier expansion of the network."],["What is a WAP used for?",["Encrypting data","Connecting wireless devices to a network","Storing user passwords","Powering off devices remotely"],1,"A Wireless Access Point (WAP) allows Wi-Fi-enabled devices\u2014like phones, tablets, or laptops\u2014to connect to a wired network without using cables. It acts as a bridge between the wireless signal and the network infrastructure, making it essential in environments that require flexible, wireless access."],["A mesh topology is best known for:",["Central control","Low cost","Redundancy and fault tolerance","Easy setup"],2,"In a mesh topology, every device is connected to multiple others, creating multiple paths for data to travel. If one connection fails, data can still reach its destination using another route. This high level of redundancy makes mesh networks very reliable, especially in environments where uptime is critical."],["Which internet connection type uses telephone lines and typically offers asymmetric speeds?",["Fiber","DSL","Satellite","Dial-up"],1,"DSL (Digital Subscriber Line) delivers internet over standard phone lines and is common in areas without cable or fiber. Download speeds are usually faster than upload speeds, making it ideal for web browsing and streaming but not heavy uploading."],["A business in a remote area needs always-on internet access with consistent speed and minimal signal loss. Which type of service should they consider?",["Satellite","Leased line","Cable","Cellular"],1,"Leased lines provide dedicated, symmetric internet access with consistent performance, making them ideal for businesses with high reliability needs. Though expensive, they offer excellent uptime and performance regardless of location."],["Which two types of internet are most commonly used for home broadband access in suburban areas?",["Dial-up and Satellite","DSL and Leased Line","Cable and Fiber","Cellular and SCADA"],2,"Cable and fiber connections offer high-speed broadband and are widely deployed in residential areas. Fiber offers the best performance, while cable remains a widely available and reliable option."],["A user complains that their video calls lag and websites take longer to load during bad weather. What internet type are they most likely using?",["Fiber","Cable","Satellite","DSL"],2,"Satellite internet is sensitive to weather conditions, which can cause signal loss or increased latency. This makes it less reliable for real-time communication like video conferencing."],["Which type of cable is most commonly used for Ethernet networking in modern LANs?",["Coaxial","Fiber optic","Twisted pair","HDMI"],2,"Twisted pair cables are the standard for modern Ethernet networks in homes and offices. These cables contain pairs of wires twisted together to reduce electromagnetic interference (EMI) from nearby devices and wiring."],["A user is connecting a modem directly to a router. Which connector type would they most likely use?",["RJ-11","RJ-45","USB-C","SC"],1,"The RJ-45 connector is the standard interface for Ethernet cables, which are used to connect networking devices such as modems, routers, and switches. It looks similar to a phone connector but is wider and supports faster data speeds. This connector enables reliable, high-speed communication in wired networks."],["You are asked to run Ethernet cable through an office building with heavy fluorescent lighting and multiple power sources. Which type of cable is most appropriate to minimize interference?",["Unshielded twisted pair (UTP)","Shielded twisted pair (STP)","Coaxial","HDMI"],1,"Shielded Twisted Pair (STP) cables have an extra layer of protective shielding around the twisted wire pairs, which helps block electromagnetic interference (EMI)."],["Which transport layer protocol provides reliable, connection-oriented communication?",["UDP","ICMP","TCP","SNMP"],2,"TCP (Transmission Control Protocol) is a connection-oriented protocol, meaning it sets up a reliable connection between devices before data is sent. It uses a process called the three-way handshake (SYN, SYN-ACK, ACK) to establish the connection, and then ensures all data is received correctly and in order."],["A technician is troubleshooting a remote desktop connection issue. The user reports they cannot connect to their work computer from home using Remote Desktop Protocol (RDP). Which port should the technician check in the firewall settings to ensure RDP is allowed?",["22","53","3389","445"],2,"TCP Port 3389 allows a remote user to view and control a Windows desktop, as if they were sitting in front of it. Used by Remote Desktop Connection (built into Windows), If inbound connections on 3389 are blocked by a firewall (on the work computer or the network), RDP will fail faster than a caffeine-deprived help des"],["Which of the following services allows users to access websites and web applications through a browser?",["File server","VoIP server","Web server","Mail server"],2,"A web server hosts websites and delivers content via HTTP or HTTPS protocols. It enables users to access information or applications through a browser interface."],["A company needs a central way to manage employee logins, apply security policies, and organize users into departments. Which type of server should they implement?",["DHCP server","Active Directory server","File server","VoIP server"],1,"Active Directory provides centralized user and resource management, allowing IT administrators to enforce policies, group permissions, and access control. It is a core service in most enterprise Windows environments."],["Which two of the following services would most likely be hosted by a file server?",["DNS","SMB","NFS","HTTP"],1,"SMB (Windows) and NFS (Linux) are both network protocols used by file servers to share and manage access to files across a network. DNS and HTTP are unrelated to direct file storage and sharing. 5 A startup wants to reduce its physical hardware footprint and increase flexibility for running test environments."],["What is the primary role of DHCP in a network?",["Resolving domain names to IP addresses","Assigning IP addresses dynamically to devices","Encrypting network traffic for secure connections","Segmenting networks into smaller subnets"],1,"DHCP (Dynamic Host Configuration Protocol) is responsible for automatically assigning network settings like IP addresses, subnet masks, and default gateways to devices on the network. This means users don\u2019t need to manually enter IP information."],["You\u2019re troubleshooting a workstation that cannot access the internet. Running ipconfig shows the following IP address: 169.254.12.45. What is the most likely cause of this issue?",["The computer has been manually assigned a static IP.","The DHCP server is unreachable or not working.","The DNS server is misconfigured.","The subnet mask is incorrect."],1,"An IP address starting with 169.254.x.x means the computer assigned itself an address using APIPA (Automatic Private IP Addressing) because it didn\u2019t hear back from a DHCP server. This address allows local communication only, but not internet access."],["Which of the following best describes a VLAN?",["A network that encrypts data for secure remote access","A logical segmentation of a physical network to improve security and performance","A protocol used to dynamically assign IP addresses","A high-speed internet connection method"],1,"A VLAN (Virtual Local Area Network) allows network administrators to separate users or departments on the same physical network into isolated virtual networks. This keeps unrelated traffic from interfering with other parts of the network and improves both security and performance."],["What is the primary difference between IPv4 and IPv6?",["IPv4 uses 128-bit addresses, while IPv6 uses 32-bit addresses","IPv6 supports more unique addresses than IPv4","IPv4 is only used in local networks","IPv6 requires manual configuration"],1,"IPv4 has about 4.3 billion possible addresses, which is not enough for the growing number of internet-connected devices. IPv6 solves this by offering trillions of unique addresses, making it more future-proof. It also includes improvements in routing and security features."],["Which wireless encryption protocol provides the strongest security?",["WEP","WPA","WPA2 with TKIP","WPA3"],3,"WPA3 is the most secure wireless encryption protocol, offering stronger encryption, protection against brute-force attacks, and forward secrecy. WEP and WPA are outdated and vulnerable to hacking, while WPA2\ufe0f is still secure but lacks some of WPA3\ufe0f\u2019s advanced protections."],["An IT technician is setting up a secure Wi-Fi network for a corporate office. Employees need to authenticate with unique usernames and passwords. Which security mode should they use?",["WPA2-Personal (PSK)","WEP","WPA2-Enterprise (EAP/RADIUS)","Open Wi-Fi with MAC filtering"],2,"WPA2-Enterprise uses a RADIUS server for authentication, allowing individual usernames and passwords instead of a single shared key. This is the best option for businesses needing strong security and user authentication management. WPA2-Personal (PSK) is fine for small networks, but not for corporate environments."],["Which mobile network technology offers the fastest speeds and lowest latency?",["3G","4G LTE","5G","Bluetooth"],2,"5G networks provide ultra-fast speeds (up to 10 Gbps) and low latency, making them ideal for high-performance applications like smart cities, IoT, and cloud computing. 3G and 4G LTE are slower, and Bluetooth is used for short-range connectivity, not mobile networks."],["Which of the following functions does a typical SOHO networking device perform?",["Only routing network traffic","Only providing Wi-Fi connectivity","Routing, wireless access, firewall, and DHCP services","Managing cloud-based applications directly"],2,"Most SOHO networking devices are multi-functional, acting as a router, wireless access point (WAP), Ethernet switch, firewall, and DHCP server in a single unit. Unlike enterprise networks, which use separate devices for each function, SOHO networks consolidate these into one device for convenience and simplicity."],["An IT technician needs to configure port forwarding on a SOHO router to allow remote access to a security camera. What steps should they take?",["Assign a static IP to the security camera, configure port forwarding in the router, and test external access","Enable DHCP on the security camera and allow the router to assign an IP dynamically","Open all ports on the firewall to ensure the security camera receives external traffic","Enable MAC filtering to allow only authorized IP addresses to access the security camera"],0,"For port forwarding to work properly, the security camera must have a static IP address so the router always directs external traffic to the correct device. The specific port used by the camera (e.g., 554 for RTSP or 8080 for web access) must be forwarded in the router's settings."],["Which protocol is commonly used to monitor and manage network devices such as switches and routers?",["DNS","SNMP","SMTP","FTP"],1,"SNMP (Simple Network Management Protocol) is used to collect information from network devices like switches, routers, and access points. It allows network tools to monitor device health, track performance metrics (such as CPU or memory usage), and generate alerts if something goes wrong."],["An IT administrator notices that certain devices on the network are using an excessive amount of bandwidth, slowing down business-critical applications. Which monitoring tool should they use to analyze traffic flow and identify the source of congestion?",["Syslog","NetFlow","Ping","DHCP"],1,"NetFlow is a traffic analysis tool that shows how data flows through the network and which devices or applications are using the most bandwidth. It provides visibility into traffic patterns, allowing administrators to pinpoint congestion sources and adjust settings or policies to improve performance."],["A company's network monitoring tool sends an automated alert indicating that a critical switch is experiencing high packet loss. Why is this type of alert important for IT teams?",["It helps them respond before users experience network issues","It ensures the network runs on outdated firmware","It eliminates the need for network monitoring altogether","It prevents future firmware updates from being installed"],0,"Automated alerts allow teams to act on a problem before users notice slowdowns or outages. High packet loss can lead to dropped connections, slow performance, or service disruptions, so early warnings give time to investigate and fix the issue."],["A user reports that their video calls are choppy, with delayed responses and audio that cuts in and out. Which two network issues are most likely contributing to this problem?",["Low bandwidth and intermittent Wi-Fi signal","DNS misconfiguration and packet fragmentation","Jitter and latency","Port blocking and firewall timeouts"],2,"Jitter and latency affect the consistency and timing of packet delivery, which is especially noticeable during real-time communications like VoIP or video conferencing. These issues often result in choppy audio, lag, or dropped segments of the conversation."],["Which tool or step should a technician use to confirm intermittent packet loss between a user's system and the default gateway?",["Reboot the DHCP server","Change the MAC address","Use the ping command","Replace the Ethernet cable with a longer one"],2,"The ping command is a simple and effective tool for testing connectivity and identifying dropped packets. Running continuous pings can reveal patterns in intermittent loss."],["A user complains that they are connected to the network but cannot access any websites. You verify that the local network is working. What is the most likely cause?",["DHCP server is down","DNS server is misconfigured or unavailable","Wi-Fi password is incorrect","IP conflict with another device"],1,"If a device can connect to the local network but can't reach websites, a DNS failure is a likely cause. DNS translates web addresses into IP addresses, so without it, the browser cannot find the requested sites."],["Which of the following statements BEST describes the advantage of a hybrid cloud model?",["It offers the lowest cost and simplest setup","It combines the control of private clouds with the scalability of public clouds","It is only used by government and research institutions","It eliminates the need for public cloud services altogether"],1,"A software license is a legal agreement that outlines how the software can be used. It tells users what they\u2019re allowed to do\u2014such as how many devices they can install it on\u2014and what actions are not allowed, like copying or reselling it."],["Scenario: A company shares a cloud storage folder with unrestricted public access. A month later, customer data is discovered on a public forum. What likely caused this breach?",["A denial-of-service (DDoS) attack occurred","A failure in the cloud provider\u2019s encryption service","Misconfigured cloud storage permissions","A power outage in the data center"],1,"Installing software beyond the terms of the license\u2014like using one paid copy on many devices\u2014is a form of piracy. Software vendors can track these violations and take legal action. Companies can be fined, sued, or forced to pay for additional licenses, making it important to follow licensing rules carefully."],["What is one major benefit of multitenancy in cloud environments?",["It gives each customer a dedicated server with no shared resources","It reduces costs by allowing multiple users to share the same infrastructure","It eliminates the need for encryption","It restricts scalability and flexibility"],1,"DRM helps protect software and media by limiting access to people who have a valid license or purchase. It\u2019s a digital tool that controls copying, sharing, and even how many devices the content can be used on. This helps companies protect their products from being pirated or misused."],["What is the first step before installing a new application?",["Click \"Next\" until installation completes","Check system requirements","Disable security settings","Restart the computer"],1,"Before installing software, it\u2019s important to check whether your computer meets the minimum and recommended system requirements. This helps ensure the application will run correctly and prevents issues like failed installations, crashes, or slow performance."],["Why might a high-performance game run poorly on a computer with an integrated graphics card?",["Integrated graphics share system RAM and have lower processing power","The CPU handles all graphics processing","Integrated graphics always outperform dedicated GPUs","The operating system does not support graphics acceleration"],0,"Integrated graphics use the system\u2019s RAM instead of having their own dedicated memory (VRAM), which reduces overall performance. These types of GPUs are good for basic tasks but struggle with demanding applications like modern video games. A dedicated graphics card is better suited for high-performance graphics needs."],["Which method is commonly used in businesses to install applications on multiple computers at once?",["Image deployment","Downloading an installer on each machine manually","Using a USB drive for each installation","Waiting for employees to install software themselves"],0,"Image deployment is a process used by IT departments to clone a computer setup\u2014including software, settings, and system configurations\u2014and apply it across many machines at once. This saves time, ensures consistency, and prevents errors that may occur with manual installations."],["What is one of the biggest risks of running out of storage space during an installation?",["The system will automatically allocate cloud storage","The installation may fail, and the system may slow down","The application will continue installing but function at half speed","The software will install onto external drives by default"],1,"When your device runs out of available storage, the software may fail to install properly or leave behind incomplete files. Low disk space can also reduce system performance, causing your device to slow down or freeze. It\u2019s best to clear space before starting any large installation."],["What should you check if an application fails to launch after installation?",["Verify OS compatibility and update drivers","Reinstall the operating system","Close all other running applications","Change the system theme"],0,"Some applications won't run unless they are compatible with your operating system version and have the correct hardware drivers installed. Updating your graphics, audio, and chipset drivers, and checking the software's requirements can often fix launch issues."],["What is the main difference between web-based and hybrid cloud applications?",["Web-based apps must be downloaded, hybrid apps run in a browser","Hybrid apps require no internet connection, web apps do","Web-based apps run in a browser, hybrid apps are installed locally but use the cloud","Hybrid apps are only used by enterprises"],2,"Web-based applications operate entirely through a browser and do not require local installation, while hybrid cloud applications (like Microsoft 365) are installed on the local system but depend on cloud connectivity for features such as real-time collaboration, auto- saving, and syncing."],["Scenario: You are helping a team member install an enterprise cloud app that requires company-wide login credentials. After installation, the app fails to launch. Which of the following should you check first?",["The user\u2019s internet speed","Whether the user has SSO configured and VPN connected","If the app has been bookmarked","If two-factor authentication is turned off"],1,"Enterprise applications often require Single Sign-On (SSO) and secure network access (like a corporate VPN) as part of their authentication and policy enforcement. Failing to meet these requirements can prevent the application from launching properly or verifying the user's credentials."],["What should a user do if a web-based cloud application is not loading in their browser?",["Restart the computer and reinstall the app","Contact the cloud provider\u2019s legal department","Clear the browser cache and disable extensions","Wait 24 hours before retrying"],2,"A common cause of loading issues in web-based applications is a cluttered or outdated browser cache and interfering browser extensions. Clearing the cache and disabling unnecessary extensions helps ensure compatibility and smooth performance."],["A user in a small office reports seeing unknown devices connected to the network. Which SOHO security feature could help prevent this issue in the future?",["File encryption","MAC address filtering","VPN configuration","Disabling browser pop-ups"],1,"MAC address filtering limits network access to known and approved devices. This is a common SOHO-level control to help reduce unauthorized wireless connections to a local network."],["Which network security control would be most effective in recovering from a ransomware attack that spread across your entire network?",["Role-based access control","Strong password enforcement","Regular backups","Network segmentation"],2,"While all options are important, regular and reliable backups ensure that data can be recovered without paying a ransom if ransomware encrypts critical files. Backups are one of the most effective protections against data loss from malware."],["Scenario: An organization experiences a phishing attack that led to unauthorized access. What are two immediate actions that should be taken according to incident response best practices?",["Conduct a full system restore from backup","Notify law enforcement immediately","Isolate affected systems","Follow the incident response plan (IRP)"],2,"In any security incident, containing the threat is critical\u2014isolating affected systems prevents further compromise. Following the predefined IRP ensures that all response actions are structured, compliant, and minimize damage."],["Which of the following is the most effective way to prevent unauthorized access to a SOHO router?",["Disabling the firewall","Keeping the default username and password","Enabling WPA3 encryption and changing the default admin credentials","Allowing remote administration for easy troubleshooting"],2,"A Trojan misleads users into installing it by appearing harmless, whereas a virus embeds itself within legitimate files and spreads when those files are executed. This distinction is important when diagnosing malware infections."],["A small business owner wants to access their office network remotely and is considering using port forwarding to allow RDP (Remote Desktop Protocol) access. Which of the following best describes the risks of this approach and a more secure alternative?",["Port forwarding improves performance but should only be used with dynamic IP addresses; using RDP over 443 is a secure workaround.","Port forwarding is safe if antivirus software is installed; adding a firewall exception will prevent attacks.","Port forwarding increases the risk of unauthorized access and attacks; using a VPN is a more secure and encrypted method for remote access.","RDP should only be used during business hours; limiting login attempts is enough to prevent all types of attacks."],2,"Malware often spreads through phishing, malicious downloads, and infected USB drives, but deleting temporary files and updating software do not contribute to infections. In fact, keeping software updated helps prevent malware attacks."],["What is the primary purpose of a phishing attack?",["To gain unauthorized physical access to a building","To trick individuals into revealing confidential information","To install hardware keyloggers on a victim\u2019s device","To exploit software vulnerabilities in operating systems"],1,"A phishing attack is a type of social engineering tactic used to deceive individuals into giving away sensitive information, such as passwords, credit card numbers, or login credentials. Attackers often use emails or fake websites that appear legitimate to create a sense of urgency or trust."],["Scenario: You are leaving your office building when someone in a delivery uniform asks you to hold the door open for them. They claim to have an urgent package for a colleague but do not have an access badge. What is the best course of action?",["Hold the door open since they appear legitimate","Ask them to wait and notify security or the intended recipient","Allow them in, but escort them to the recipient\u2019s office","Ignore them and continue walking"],1,"This situation is an example of tailgating, a physical security risk where someone attempts to gain unauthorized access by following someone with legitimate access. Even if the person seems trustworthy, the correct response is to follow protocol: notify security personnel or the recipient directly."],["What is the best method to prevent sensitive information from being stolen through dumpster diving?",["Storing old documents in a locked cabinet","Shredding all sensitive documents before disposal","Using complex passwords for all accounts","Avoiding public Wi-Fi connections"],1,"Dumpster diving involves searching through trash or recycling to find discarded items containing confidential information, such as account numbers, passwords, or internal documents. The most effective way to prevent this kind of data theft is to shred sensitive documents before they are thrown away."],["Which of the following is the best reason for enabling automatic browser updates?",["To improve internet speed","To ensure the latest security patches are applied","To prevent websites from tracking your activity","To install new browser extensions automatically"],1,"Enabling automatic browser updates ensures that the browser receives the most recent security patches and bug fixes as soon as they are available. This helps protect against newly discovered vulnerabilities that could be exploited by attackers."],["Scenario: A company employee installs a new browser extension to improve productivity. Afterward, they notice unexpected pop-ups and unauthorized access to their accounts. What is the most likely cause of this issue?",["The browser cache was not cleared before installing the extension","The extension was downloaded from an untrusted source","The company network was compromised before the installation","The employee failed to disable JavaScript before installing the extension"],1,"Installing extensions from untrusted sources can lead to malicious software being added to the browser. These extensions may include spyware, adware, or credential stealers that can generate pop-ups and access sensitive data without the user's knowledge."],["What is an example of a common software vulnerability that attackers exploit?",["Strong passwords","Multi-factor authentication","Buffer overflow","Firewall rules"],2,"Mobile computing devices are designed to be portable and operate using battery power, allowing use without constant access to an outlet. This includes laptops, smartphones, and tablets that can be used on the go."],["Which of the following best describes a zero-day exploit?",["An attack targeting a known vulnerability with an available patch","An attack that exploits a vulnerability before a patch is released","A phishing attack using fake emails to steal information","A brute-force attack attempting to guess passwords"],1,"Bluetooth is commonly used in mobile computing to connect wireless peripherals like keyboards, mice, and headphones. NFC (Near Field Communication) enables short-range communication for tasks like mobile payments and device pairing. Both technologies allow wireless data exchange without the need for physical cables."],["Which real-world security incident was caused by an unpatched software vulnerability?",["Twitter Insider Attack (2020)","Equifax Data Breach (2017)","Colonial Pipeline Ransomware Attack (2021)","Sony PlayStation Network Hack (2011)"],3,"A laptop provides the ideal balance of portability, a physical keyboard, and the power to run full desktop business applications. Unlike smartphones or tablets, laptops support multi-tasking, file management, and advanced software tools. They are commonly used by remote workers for both mobility and performance."],["What is the main purpose of an Intrusion Detection System (IDS)?",["Encrypt network traffic","Detect and alert administrators of suspicious activity","Prevent unauthorized users from logging in","Scan for viruses on a system"],2,"Mobile devices are designed to be used on the go, often relying on battery power for extended periods. Prioritizing energy efficiency helps preserve battery life without significantly sacrificing performance. This design choice supports longer use between charges and keeps devices lightweight and cool."],["A user reports that their laptop keyboard is no longer responding. What is the most likely solution?",["Replace individual keys that are not working","Replace the entire keyboard assembly","Update the laptop\u2019s firmware","Use a compressed air canister to clean under the keys"],1,"Laptop keyboards are typically built as a single integrated unit, making it difficult or impossible to replace individual keys. If multiple keys fail or the entire keyboard stops responding, the most effective fix is to replace the full keyboard assembly."],["Scenario: A graphic designer is looking for a device that allows precise digital drawing while maintaining portability. What accessory should they consider?",["USB-C docking station","Trackpoint","Drawing pad","Bluetooth keyboard"],2,"A drawing pad (also known as a graphics tablet) is designed to offer precision input with a stylus, making it ideal for digital art and design. These devices are often lightweight and portable, allowing users to create detailed work while on the move."],["A technician is working on a tablet that frequently shuts down while in use. The device is also warm to the touch. What is the most likely issue?",["Malware infection","Swollen battery","Overheating","Poor Wi-Fi signal"],2,"Frequent shutdowns and the device feeling hot are strong indicators of overheating. Tablets can shut down automatically to prevent heat damage to internal components. Blocked vents, background processes, or intensive app usage may contribute to rising temperatures."],["Which operating system tool can be used to adjust sleep and brightness settings on a laptop?",["Device Manager","Disk Management","Power Options","Task Manager"],2,"The Power Options tool in Windows allows users to customize sleep settings, screen brightness, and battery performance modes. It\u2019s essential for managing how a laptop uses energy and enters low-power states. This helps improve both battery life and user convenience."],["A smartphone battery swells and the case begins to separate. What should a technician do first?",["Continue using the device until it stops charging","Place the phone in a sealed bag and freeze it","Stop using the device immediately and seek replacement","Update the mobile operating system"],2,"A swollen battery is a serious safety hazard that can lead to leakage, fire, or explosion. The device should be powered off immediately and no longer used or charged. It must be handled carefully and replaced by a qualified technician using a manufacturer- approved part."]];
  const TOTAL_QUESTIONS_PER_RUN = 15;
  const LEVEL_TITLES = ["Help Desk Trainee", "Help Desk Analyst", "IT Support Specialist", "SysAdmin", "Network Engineer"];

  const app = document.getElementById('app');

  let state = {
    deck: shuffle(range(QUESTION_BANK.length)),
    deckPos: 0,
    runQuestions: [],
    currentQuestion: 0,
    score: 0,
    lives: 3,
    streak: 0,
    bestStreak: 0,
    coins: 0,
    selected: null,
    submitted: false,
    screen: 'start' // start | playing | gameover | gamewon
  };

  function range(n) { return Array.from({ length: n }, (_, i) => i); }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function shuffleQuestion(item) {
    const q = item[0], opts = item[1], correctIdx = item[2], exp = item[3];
    const order = shuffle([0, 1, 2, 3]);
    const newOpts = order.map(i => opts[i]);
    const newCorrect = order.indexOf(correctIdx);
    return { question: q, options: newOpts, answer: newCorrect, explanation: exp };
  }

  function buildRun() {
    let d = state.deck;
    let pos = state.deckPos;
    const picked = [];
    for (let i = 0; i < TOTAL_QUESTIONS_PER_RUN; i++) {
      if (pos >= d.length) {
        d = shuffle(range(QUESTION_BANK.length));
        pos = 0;
      }
      picked.push(d[pos]);
      pos++;
    }
    state.deck = d;
    state.deckPos = pos;
    state.runQuestions = picked.map(idx => shuffleQuestion(QUESTION_BANK[idx]));
  }

  function startGame() {
    buildRun();
    state.currentQuestion = 0;
    state.score = 0;
    state.lives = 3;
    state.streak = 0;
    state.bestStreak = 0;
    state.coins = 0;
    state.selected = null;
    state.submitted = false;
    state.screen = 'playing';
    render();
  }

  function goHome() {
    if (state.screen === 'playing' && (state.currentQuestion > 0 || state.selected !== null)) {
      if (!confirm('Quit this round and return to the start menu? Your progress in this run will be lost.')) return;
    }
    state.screen = 'start';
    render();
  }

  function selectOption(index) {
    if (state.submitted) return;
    state.selected = state.selected === index ? null : index;
    render();
  }

  function submitAnswer() {
    if (state.submitted || state.selected === null) return;
    state.submitted = true;

    const q = state.runQuestions[state.currentQuestion];
    if (state.selected === q.answer) {
      state.score += 10;
      state.streak += 1;
      state.bestStreak = Math.max(state.bestStreak, state.streak);
      if (state.streak % 3 === 0) state.coins += 15;
    } else {
      state.streak = 0;
      state.lives -= 1;
    }
    render();
  }

  function nextQuestion() {
    state.selected = null;
    state.submitted = false;

    if (state.lives <= 0) {
      state.screen = 'gameover';
      render();
      return;
    }
    if (state.currentQuestion + 1 >= state.runQuestions.length) {
      state.screen = 'gamewon';
    } else {
      state.currentQuestion += 1;
    }
    render();
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function currentLevel() {
    return Math.min(Math.floor(state.score / 40), 4);
  }

  function render() {
    if (state.screen === 'start') return renderStart();
    if (state.screen === 'gameover') return renderGameOver();
    if (state.screen === 'gamewon') return renderGameWon();
    return renderPlaying();
  }

  function renderStart() {
    app.innerHTML = `
      <div class="center-screen">
        <h1>A+ 1200 Quest</h1>
        <p class="subtitle">A CompTIA A+ Core study game built from the ACI Learning A+ 1200 series eBook.</p>
        <p class="subtitle small">${QUESTION_BANK.length} unique questions pulled straight from the course's own Knowledge Checks, covering hardware, OS, networking, virtualization, security, mobile devices, and operational procedures. Rounds shuffle fresh every time so you won't see the same question twice until the deck cycles.</p>
        <button class="primary" id="startBtn">Start Training</button>
      </div>
    `;
    document.getElementById('startBtn').onclick = startGame;
  }

  function renderGameOver() {
    app.innerHTML = `
      <div class="center-screen">
        <div class="result-title lose">System Crashed!</div>
        <p class="result-line">You ran out of lives.</p>
        <p class="result-line">Final XP: ${state.score} | Title: ${LEVEL_TITLES[currentLevel()]}</p>
        <p class="result-line" style="color:var(--orange)">Best Streak: ${state.bestStreak} \u{1F525}</p>
        <button class="primary" id="restartBtn" style="margin-top:16px;">Reboot System &amp; Try Again</button>
        <button class="menu-btn" id="homeBtn" style="margin-top:12px;">\u{1F3E0} Back to Menu</button>
      </div>
    `;
    document.getElementById('restartBtn').onclick = startGame;
    document.getElementById('homeBtn').onclick = goHome;
  }

  function renderGameWon() {
    app.innerHTML = `
      <div class="center-screen">
        <div class="result-title win">Module Complete!</div>
        <p class="result-line">Final XP: ${state.score}</p>
        <p class="result-line" style="color:var(--purple)">Rank Achieved: ${LEVEL_TITLES[currentLevel()]}</p>
        <p class="result-line" style="color:var(--orange)">Best Streak: ${state.bestStreak} \u{1F525}</p>
        <p class="result-line" style="color:var(--yellow)">Tech Coins Earned: \u{1FA99} ${state.coins}</p>
        <button class="primary" id="nextRoundBtn" style="margin-top:16px;">Take Next Round</button>
        <button class="menu-btn" id="homeBtn" style="margin-top:12px;">\u{1F3E0} Back to Menu</button>
      </div>
    `;
    document.getElementById('nextRoundBtn').onclick = startGame;
    document.getElementById('homeBtn').onclick = goHome;
  }

  function renderPlaying() {
    const q = state.runQuestions[state.currentQuestion];
    if (!q) return;
    const lvl = currentLevel();
    const hearts = '\u2764\uFE0F'.repeat(state.lives) + '\u{1F5A4}'.repeat(3 - state.lives);

    const optionsHtml = q.options.map((opt, idx) => {
      let cls = 'opt';
      let hint = '';
      if (state.submitted) {
        if (idx === q.answer) cls += ' correct';
        else if (idx === state.selected) cls += ' wrong';
        else cls += ' dim';
      } else if (idx === state.selected) {
        cls += ' selected';
        hint = '<span class="unselect-hint">tap to unselect</span>';
      }
      return `<button class="${cls}" data-idx="${idx}" ${state.submitted ? 'disabled' : ''}><span>${esc(opt)}</span>${hint}</button>`;
    }).join('');

    const streakHtml = state.streak >= 2 ? `<span class="streak">\u{1F525} ${state.streak} Streak!</span>` : '';

    let explainHtml = '';
    if (state.submitted) {
      const good = state.selected === q.answer;
      explainHtml = `
        <div class="explain">
          <p class="verdict ${good ? 'good' : 'bad'}">${good ? 'Correct!' : 'Not quite.'}</p>
          <p class="body">${esc(q.explanation)}</p>
          <button class="next" id="nextBtn">${state.currentQuestion + 1 >= state.runQuestions.length ? 'Finish Round' : 'Next Question'}</button>
        </div>
      `;
    }

    const submitRowHtml = !state.submitted ? `
      <div class="actions-row">
        <button class="submit-btn" id="submitBtn" ${state.selected === null ? 'disabled' : ''}>Submit Answer</button>
      </div>
    ` : '';

    app.innerHTML = `
      <div class="topbar"><button class="menu-btn" id="homeBtn">\u{1F3E0} Menu</button></div>
      <h1 style="text-align:center;font-size:1.8rem;">A+ 1200 Quest</h1>
      <div class="panel">
        <div class="statbar">
          <div><span class="stat-label">Level &amp; Title</span><span class="stat-value" style="color:var(--purple)">Lv.${lvl + 1} ${LEVEL_TITLES[lvl]}</span></div>
          <div><span class="stat-label">XP</span><span class="stat-value" style="color:#93c5fd">${state.score}</span></div>
          <div><span class="stat-label">System Health</span><span class="stat-value" style="color:#f87171">${hearts}</span></div>
          <div><span class="stat-label">Tech Coins</span><span class="stat-value" style="color:var(--yellow)">\u{1FA99} ${state.coins}</span></div>
        </div>
        <div class="qheader">
          <h2>Question ${state.currentQuestion + 1} of ${state.runQuestions.length}</h2>
          ${streakHtml}
        </div>
        <div class="qbox">${esc(q.question)}</div>
        <div class="options">${optionsHtml}</div>
        ${submitRowHtml}
        ${explainHtml}
      </div>
    `;

    document.querySelectorAll('.opt').forEach(btn => {
      btn.addEventListener('click', () => selectOption(parseInt(btn.getAttribute('data-idx'), 10)));
    });
    const submitBtn = document.getElementById('submitBtn');
    if (submitBtn) submitBtn.addEventListener('click', submitAnswer);
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn) nextBtn.addEventListener('click', nextQuestion);
    const homeBtn = document.getElementById('homeBtn');
    if (homeBtn) homeBtn.addEventListener('click', goHome);
  }

  render();
})();
</script>
</body>
</html>
