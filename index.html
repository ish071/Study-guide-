<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A+ 1200 Quest</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel2: #0f1729;
    --border: #334155;
    --blue: #3b82f6;
    --blue-dark: #2563eb;
    --green: #16a34a;
    --red: #dc2626;
    --purple: #a78bfa;
    --yellow: #facc15;
    --orange: #fb923c;
    --text: #f8fafc;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 24px 16px;
    padding: max(24px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }
  .wrap { width: 100%; max-width: 720px; }
  @media (max-width: 480px) {
    body { padding: 14px 10px; }
    .panel { padding: 16px; border-radius: 12px; }
    h1 { font-size: 1.6rem; }
    .qbox { padding: 16px; font-size: 1.05rem; }
    .statbar { padding: 12px; gap: 8px; }
    button.primary { padding: 14px 28px; width: 100%; }
  }
  .center-screen {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  h1 { color: var(--blue); font-size: 2.2rem; font-weight: 800; margin: 0 0 12px; }
  .subtitle { color: var(--muted); max-width: 520px; margin: 0 auto 10px; }
  .subtitle.small { font-size: 0.9rem; color: #64748b; margin-bottom: 28px; }
  button.primary {
    background: var(--blue-dark);
    color: white;
    font-weight: 700;
    border: none;
    padding: 16px 40px;
    border-radius: 10px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 0 20px rgba(59,130,246,0.5);
  }
  button.primary:hover { background: var(--blue); }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .statbar {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    background: var(--panel2);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 22px;
    text-align: center;
  }
  @media (min-width: 480px) {
    .statbar { grid-template-columns: repeat(4, 1fr); }
  }
  .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); display: block; }
  .stat-value { font-weight: 700; font-size: 1.05rem; }
  .qheader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .qheader h2 { font-size: 1.15rem; color: #e2e8f0; margin: 0; }
  .streak { font-size: 0.85rem; font-weight: 700; color: var(--orange); }
  .qbox {
    background: #334155;
    padding: 22px;
    border-radius: 10px;
    font-size: 1.15rem;
    margin-bottom: 20px;
    line-height: 1.4;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    text-align: left;
    background: #334155;
    border: 1px solid #475569;
    color: var(--text);
    padding: 14px 16px;
    min-height: 48px;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    width: 100%;
  }
  .opt:hover:not(:disabled) { background: var(--blue-dark); border-color: var(--blue); }
  .opt:disabled { cursor: default; }
  .opt.selected { background: var(--blue-dark); border-color: var(--blue); border-width: 2px; }
  .opt.correct { background: #15803d; border-color: #4ade80; border-width: 2px; }
  .opt.wrong { background: #b91c1c; border-color: #f87171; border-width: 2px; }
  .opt.dim { opacity: 0.45; }
  .opt > span:first-child { flex: 1; min-width: 0; overflow-wrap: break-word; }
  .opt .unselect-hint { font-size: 0.72rem; color: #bfdbfe; opacity: 0.85; white-space: nowrap; }
  .actions-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  button.submit-btn {
    background: var(--green);
    color: white;
    border: none;
    font-weight: 700;
    padding: 12px 24px;
    min-height: 44px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    flex: 1;
  }
  button.submit-btn:disabled { background: #475569; cursor: not-allowed; opacity: 0.6; }
  button.submit-btn:hover:not(:disabled) { background: #22c55e; }
  .topbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
  }
  button.menu-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 8px 14px;
    min-height: 40px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  button.menu-btn:hover { color: var(--text); border-color: var(--muted); }
  .explain {
    margin-top: 18px;
    padding: 16px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .explain .verdict { font-weight: 700; margin: 0 0 8px; }
  .verdict.good { color: #4ade80; }
  .verdict.bad { color: #f87171; }
  .explain p.body { color: #cbd5e1; font-size: 0.92rem; line-height: 1.5; margin: 0; }
  button.next {
    margin-top: 16px;
    background: var(--blue-dark);
    color: white;
    border: none;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
  }
  button.next:hover { background: var(--blue); }
  .result-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 14px; }
  .result-title.win { color: #4ade80; }
  .result-title.lose { color: #f87171; }
  .result-line { font-size: 1.05rem; margin: 4px 0; color: var(--muted); }
</style>
</head>

<script>
(function () {
  const QUESTION_BANK = [["What is the purpose of a Power Supply Unit (PSU) in a PC?",["To convert DC power into AC power","To store backup electricity for later use","To convert AC power into regulated DC power for computer components","To increase the voltage supplied to the motherboard"],2,"A PSU is essential in a PC because it converts high-voltage AC power from a wall outlet into low-voltage DC power, which computer components need to function. Without this conversion, the motherboard, CPU, RAM, and other components would be unable to receive stable power."],["Why is electrostatic discharge (ESD) dangerous for PC components?",["It causes physical burns on the motherboard","It generates excessive heat, damaging capacitors","It can permanently damage sensitive electronic components like CPUs and RAM","It increases power efficiency"],2,"ESD occurs when static electricity discharges onto sensitive electronic components, potentially destroying delicate circuits inside a CPU, RAM, or motherboard. Even a discharge that is too small for humans to feel can cause microscopic damage that leads to system instability, crashes, or total hardware failure."],["Which device helps protect a computer from power surges?",["Uninterruptible Power Supply (UPS)","Voltage Regulator","Surge Protector","All of the above"],3,"Each of these devices plays a critical role in protecting a PC from electrical fluctuations. A surge protector blocks voltage spikes that could damage sensitive components. A voltage regulator ensures that power remains at a steady level to avoid brownouts or power dips."],["Which PSU efficiency rating provides the highest energy efficiency?",["80 Plus Bronze","80 Plus Gold","80 Plus Platinum","80 Plus Titanium"],3,"The 80 Plus certification measures PSU efficiency. A Titanium-rated PSU is the most energy-efficient, with up to 94% efficiency at 50% load. This means it converts almost all incoming power into usable energy, minimizing heat production and reducing wasted electricity."],["What happens if you set a PSU to the incorrect voltage manually?",["The PC will run at half speed","The PSU could fail and potentially damage other components","The CPU will not boot but will remain undamaged","The PSU will adjust automatically"],1,"Many older PSUs have manual voltage selection switches that must be set correctly (e.g., 120V for North America, 240V for Europe). Selecting the wrong voltage can cause catastrophic failure. If set too low, the system may not receive enough power to boot."],["Which case type is most suitable for a high-performance workstation requiring multiple GPUs and extensive cooling?",["Mini-Tower","Full-Tower","Small Form Factor (SFF)","Desktop"],1,"Full-Tower cases are the largest type of chassis available and provide ample space for multiple GPUs, high-end cooling solutions, and extensive expansion options."],["What is one major advantage of choosing a Mid-Tower case over a Full-Tower case?",["More storage capacity","Greater portability and space efficiency","Supports only Mini-ITX motherboards","Provides the best thermal performance"],1,"While Full-Tower cases offer superior expandability, they take up a lot of space and can be difficult to move. Mid-Tower cases strike a balance between performance and practicality, supporting ATX motherboards while still being compact enough to fit comfortably under a desk."],["Why is cable management important in a computer case?",["It increases the speed of the CPU","It improves airflow and cooling efficiency","It prevents software from crashing","It reduces the number of power cables needed"],1,"Proper cable management helps keep internal components organized and prevents airflow blockages. Good cable routing ensures that fans and cooling systems can efficiently move air through the case, reducing the risk of overheating."],["Which case type is typically used in data centers and enterprise environments?",["Mid-Tower","Server/Rackmount","Mini-Tower","SFF"],1,"Server and rackmount cases are designed for data centers, enterprise applications, and home lab environments where multiple systems need to be housed efficiently."],["A student wants to build a compact gaming PC but still needs decent airflow. Which case type should they choose?",["Server/Rackmount","Full-Tower","Small Form Factor (SFF)","Horizontal/Desktop"],2,"SFF cases are designed for portability and space efficiency while still supporting high-performance components. Although they require careful hardware selection due to limited space, many SFF cases include good airflow solutions, such as strategically placed intake and exhaust fans or liquid cooling support."],["Which motherboard form factor typically provides the most PCIe expansion slots?",["Mini-ITX","Micro-ATX","ATX","E-ATX"],3,"Extended ATX (E-ATX) motherboards are larger than standard ATX boards and typically offer the most PCIe expansion slots. These boards are designed for high-performance systems like servers, workstations, or gaming rigs that require multiple GPUs or add-on cards."],["Which form factor is best suited for a compact, space-saving build?",["ATX","Mini-ITX","E-ATX","Micro-ATX"],1,"Mini-ITX is a small form factor motherboard designed for space-saving systems like compact desktops and home theater PCs. It typically includes one expansion slot and supports essential features in a very limited footprint."],["What is the primary advantage of choosing an ATX motherboard over a Micro-ATX motherboard?",["Lower cost","More expansion slots","Smaller size","Integrated graphics"],1,"An ATX motherboard offers more PCIe expansion slots than a Micro-ATX board, allowing for additional components such as graphics cards, sound cards, or RAID controllers. This makes it better suited for systems that require greater flexibility and upgradability."],["Which form factor is most used in business desktops due to its balance of size and expansion options?",["Pico-ITX","E-ATX","Micro-ATX","Mini-STX"],2,"Micro-ATX motherboards offer a strong balance between physical size and expansion capability, making them ideal for business desktops. They typically support up to four expansion slots while fitting in smaller cases, which reduces cost and saves space."],["Why might a user choose a Mini-STX motherboard instead of a Mini-ITX?",["To support multiple GPUs","To allow for CPU upgrades","To add more PCIe expansion cards","To install more RAM"],1,"Mini-STX motherboards are designed to be even smaller than Mini-ITX but still offer the advantage of a socketed CPU, which allows for processor upgrades. In contrast, many Mini-ITX systems, especially ultra-compact ones\u2014use soldered CPUs with no upgrade path."],["Which front panel connector allows the computer to be turned on?",["HDD LED","Power Switch","Reset Switch","USB Header"],1,"The Power Switch connector (PWR_SW) is what allows the physical power button on the front of the case to communicate with the motherboard. When the button is pressed, it sends a signal through this connector that tells the motherboard to start the boot-up process."],["Which header should you use to connect front-panel USB 3.0 ports?",["USB 2.0","USB 3.0","USB Type-C","HD Audio"],1,"The USB 3.0 header connects the high-speed USB ports on the front of the case to the motherboard. These headers are typically blue and support much faster data transfer than older USB 2.0 ports."],["What is the purpose of the HD Audio header?",["To provide power to system fans","To connect front-panel USB ports","To enable sound through the front audio jacks","To connect RGB lighting"],2,"The HD Audio header connects the front-panel headphone and microphone ports to the motherboard. This allows users to plug in headsets or microphones directly into the case and use them without needing to reach behind the computer."],["Why is it important to check the motherboard\u2019s user guide when connecting case headers?",["Different motherboards have different header layouts","The user guide provides troubleshooting tips","It helps identify correct pin orientations","All of the above"],3,"Every motherboard is designed a little differently. The user guide shows the exact location and layout of important headers like power, reset, and USB connectors. It also helps prevent mistakes like plugging cables in backwards or into the wrong pins, which can lead to system failures or even hardware damage."],["Which type of header allows for individually controlled RGB lighting effects?",["RGB","ARGB","SYS_FAN","HD Audio"],1,"ARGB (Addressable RGB) headers allow users to customize each LED light individually, meaning you can display multiple colors and effects at the same time across your lighting strips or fans. In contrast, standard RGB headers change all connected lights to the same color."],["Which part of older chipsets handled communication between the CPU and RAM?",["Southbridge","Northbridge","PCH","PCIe"],1,"The Northbridge was the part of the motherboard\u2019s chipset that managed high- speed communication between the CPU, RAM, and graphics card. It played a key role in how fast data could move between those parts."],["What is the primary function of PCIe lanes?",["Transfer power to the CPU","Manage USB connections","Enable high-speed communication between the CPU and expansion cards","Store BIOS settings"],2,"PCIe lanes are like dedicated highways that allow expansion cards\u2014such as graphics cards, SSDs, and network cards\u2014to send and receive data quickly to and from the CPU. The more lanes a device has access to, the faster it can work."],["Which chipset feature allows users to increase CPU speed beyond its factory settings?",["RAID support","PCIe lane allocation","Overclocking","USB power management"],2,"Overclocking lets users push their CPU to run faster than the speed it was originally designed for. This can boost performance for gaming, video editing, or other demanding tasks. However, running the CPU faster creates more heat, so good cooling systems are necessary to keep the computer stable."],["Which type of chipset configuration is most commonly used in modern systems?",["Northbridge/Southbridge","Platform Controller Hub (PCH)","External chipset controllers","Southbridge-only architectures"],1,"Modern motherboards use a Platform Controller Hub (PCH), which replaces the older Northbridge/Southbridge design. The CPU now handles fast tasks (like memory access), while the PCH takes care of other functions, such as USB ports and storage. This setup improves speed and reduces bottlenecks between components."],["What happens if an NVMe SSD is installed in a shared PCIe slot?",["It disables the system\u2019s CPU","The motherboard will refuse to boot","It may reduce bandwidth for other PCIe devices","It will overheat and damage the chipset"],2,"Some motherboard slots share PCIe lanes, meaning when one device\u2014like an NVMe SSD\u2014is installed, it can reduce how many lanes are available to other parts, like a graphics card or SATA port. This doesn\u2019t break anything, but it can lower performance."],["Which storage connector offers the highest data transfer speeds?",["SATA","PCIe NVMe (M.2)","USB 3.0","IDE"],1,"While SATA (6 Gbps) is commonly used for SSDs and HDDs, PCIe NVMe M.2 drives can exceed 7,000 MB/s, making them significantly faster. USB 3.0 is used for external storage but is not as fast as NVMe, and IDE is an outdated technology."],["What is the primary function of a USB header on a motherboard?",["Connects external graphics cards","Powers internal cooling fans","Links front-panel USB ports to the motherboard","Controls system RGB lighting"],2,"USB headers allow the case\u2019s front-panel USB ports to function by connecting them directly to the motherboard. This enables convenient access for USB drives, peripherals, and external storage."],["A motherboard includes a PCIe x16 slot. Which type of expansion card is most installed in this slot?",["Wi-Fi Adapter","Sound Card","Graphics Card (GPU)","Ethernet Card"],2,"The PCIe x16 slot is designed for high-bandwidth components, primarily graphics cards, which require maximum data transfer speeds for rendering images, video, and gaming. Smaller PCIe x1 slots are typically used for Wi-Fi adapters, sound cards, and Ethernet cards."],["What is the primary difference between an RGB and an ARGB header?",["RGB allows per-LED control, while ARGB does not.","ARGB allows per-LED control, while RGB does not.","RGB requires an external controller, but ARGB does not.","There is no difference; they are interchangeable."],1,"RGB headers provide a single color across all LEDs at the same time, while ARGB (Addressable RGB) headers allow individual LED control, enabling dynamic lighting effects like rainbow patterns and color cycling."],["Why is it important to check a motherboard's user manual before installing storage devices?",["To ensure that the correct connectors are used","To confirm compatibility with M.2 and SATA devices","To avoid installing an NVMe SSD in a SATA-only M.2 slot","All of the above"],3,"Motherboards have different slot configurations, and some M.2 slots only support SATA, while others support NVMe. Checking the manual ensures correct installation, proper connectivity, and full performance of storage devices."],["Which expansion slot is commonly used for high-performance graphics cards?",["PCIe x1","PCIe x4","PCIe x16","M.2"],2,"PCIe x16 slots provide the most bandwidth and data lanes, making them ideal for graphics cards (GPUs) that require high-speed connections to the CPU and memory. While other PCIe slots can host expansion cards, GPUs perform best in a full x16 slot."],["What happens if you install two PCIe devices in a motherboard that only has 16 PCIe lanes?",["Both devices will run at full speed.","Each device will get fewer PCIe lanes and may run slower.","Only one device will work at a time.","PCIe lanes do not affect performance."],1,"PCIe lanes are shared across expansion slots. If a motherboard has 16 PCIe lanes and you install two devices, the motherboard may split them into x8/x8 mode, meaning each device gets half the available bandwidth. This is common when using multiple GPUs or NVMe storage drives."],["Which expansion card type is commonly used for video capture and streaming?",["Sound card","Capture card","RAID controller","Network card"],1,"Capture cards allow computers to record and stream video from external sources, such as gaming consoles, cameras, and other PCs. These cards use PCIe slots to ensure high- speed data transfer, minimizing lag during streaming."],["What is the primary function of an M.2 Wi-Fi card?",["High-speed storage","Bluetooth and wireless networking","High-performance graphics processing","Audio enhancement"],1,"M.2 Wi-Fi/Bluetooth modules add wireless networking to a PC that doesn\u2019t have built-in Wi-Fi. These small cards fit into M.2 Key E or A+E slots and often require external antenna connectors for better signal reception."],["Why should users check their motherboard manual before installing an expansion card?",["To verify slot compatibility","To check bandwidth allocation","To ensure proper installation","All of the above e."],3,"Every motherboard has different slot layouts, bandwidth limits, and compatibility requirements. Checking the manual ensures: \u2022 The correct PCIe or M.2 slot is used. \u2022 The expansion card receives enough bandwidth. \u2022 The installation follows proper orientation and alignment."],["What is the primary function of BIOS or UEFI in a computer?",["Manage file storage","Initialize hardware and start the OS","Run system diagnostics after the OS loads","Improve internet connectivity"],1,"BIOS or UEFI is the first program that runs when a computer powers on. It checks and initializes all hardware\u2014like the CPU, memory, and storage\u2014before handing control over to the operating system. Without it, the computer wouldn\u2019t know how to start up or communicate with its components."],["Which of the following is a key advantage of UEFI over traditional BIOS?",["UEFI supports only older operating systems","UEFI allows the use of larger hard drives and has better security features","UEFI runs only 16-bit applications","BIOS is faster than UEFI"],1,"UEFI supports drives larger than 2TB through GPT partitioning and includes modern security tools like Secure Boot and TPM (Trusted Platform Module). These features help protect against malware and improve system performance and compatibility with modern hardware."],["Which type of firmware should be used for a modern 64-bit operating system like Windows 11?",["Legacy BIOS","UEFI","16-bit DOS","EFI 1.0"],1,"UEFI is required for Windows 11 because it supports features like Secure Boot and TPM, which are not available in Legacy BIOS. It also works better with 64-bit systems, offers faster boot times, and supports more advanced hardware."],["A user wants to install Windows 7 (32-bit) on a modern UEFI motherboard. What setting might they need to enable?",["Secure Boot","Legacy Boot / Compatibility Support Module (CSM)","Fast Boot","Virtualization"],1,"Many older operating systems like 32-bit Windows 7 can\u2019t boot in UEFI mode. Enabling Legacy Boot or CSM allows the motherboard to behave like an older BIOS system, making it compatible with older software and installation tools."],["A system is running Windows 10 on Legacy BIOS. The user wants to upgrade to Windows 11. What must they do first?",["Enable Secure Boot and TPM in BIOS","Convert the hard drive from MBR to GPT and switch to UEFI","Install a BIOS update to support Windows 11","Nothing, Windows 11 supports BIOS natively"],1,"Windows 11 requires a UEFI system and a hard drive formatted with the GPT (GUID Partition Table). Legacy BIOS uses MBR (Master Boot Record), which isn\u2019t supported by Windows 11. Users need to convert the drive format and enable UEFI mode in BIOS settings before upgrading."],["Which CPU component handles floating-point calculations?",["ALU","FPU","Control Unit","L1 Cache"],1,"The FPU (Floating Point Unit) handles decimal-based operations, which are essential for tasks like 3D rendering, scientific computing, and simulations. The ALU handles only integer math and logical comparisons."],["What is the primary advantage of x64 CPUs over x86 CPUs?",["They use fewer instructions","They support more RAM and advanced processing","They are used only in mobile devices","They run older applications faster"],1,"x64 CPUs can address significantly more RAM than x86 and support 64-bit applications for better performance. They also maintain backward compatibility with most 32- bit software."],["Which CPU architecture is commonly found in mobile devices?",["x64","ARM","x86","CISC"],1,"ARM processors use a simplified instruction set that prioritizes power efficiency, making them ideal for mobile devices and tablets. They are common in smartphones and embedded systems."],["What is the primary function of CPU cache memory?",["Store long-term data","Speed up access to frequently used instructions","Transfer data between the CPU and GPU","Increase storage capacity"],1,"Cache memory stores data closer to the CPU than RAM, reducing wait times during processing. It helps bridge the speed gap between the CPU and main system memory."],["What is the difference between a process and a thread?",["A process is a single-core CPU, and a thread is a multicore CPU","A process is a running program, while a thread is a sub-task within a process","A process only works on ARM CPUs, while a thread works on x64 CPUs","There is no difference"],1,"Threads allow a program (process) to run multiple tasks concurrently within the same application. This improves efficiency, especially on multicore CPUs that can manage multiple threads at once."],["Which CPU socket type is commonly used by modern Intel processors?",["PGA","LGA","ZIF","AM4"],1,"LGA (Land Grid Array) is the socket type used by most modern Intel processors. In this design, the pins are located on the motherboard, and the CPU has flat contact points on its underside."],["What is the main advantage of a ZIF (Zero Insertion Force) socket?",["Provides a stronger connection","Prevents CPU overheating","Allows the CPU to be installed with minimal force","Uses compression to secure the CPU"],2,"A ZIF socket is designed so that the CPU can be placed into the socket without applying pressure. Once aligned correctly, a locking lever is used to secure the CPU."],["Where are multi-socket CPUs commonly found?",["Gaming laptops","Budget desktop PCs","Servers and data centers","Office workstations"],2,"Multi-socket systems allow for more than one CPU to be installed on the same motherboard. These setups are typically used in servers, data centers, and enterprise environments, where systems must handle heavy processing loads, such as hosting websites, cloud services, or performing complex simulations."],["Which RAM form factor is commonly used in laptops?",["DIMM","SO-DIMM","ECC RAM","Quad-Channel"],1,"SO-DIMM (Small Outline Dual In-line Memory Module) is the type of RAM used in laptops and compact systems due to its smaller size. It functions the same as standard desktop RAM but is designed to fit into tighter spaces. SO-DIMM is not interchangeable with DIMM, which is used in desktops."],["Which DDR version introduced the 288-pin DIMM?",["DDR2","DDR3","DDR4","DDR5"],2,"DDR4 memory introduced the use of 288-pin DIMM modules, which replaced the 240-pin layout used by DDR3. This change improved both data transfer speed and power efficiency. The different pin count and notch position also help prevent installation of incompatible modules."],["What happens if you install DDR4 RAM in a motherboard that only supports DDR3?",["It will work but run at lower speeds.","It will not fit due to different notch placement.","It will overheat and cause damage.","It will downgrade itself to DDR3 speeds."],1,"Each DDR generation has a unique notch position that prevents it from being inserted into an incompatible slot. DDR4 cannot be installed in a DDR3 motherboard because the physical connector is designed to block improper installations. This helps prevent electrical damage and confusion during upgrades."],["How do you check your installed RAM on a Windows PC?",["Device Manager","Task Manager \u2192 Performance Tab \u2192 Memory","Control Panel \u2192 RAM Settings","BIOS Setup"],1,"On Windows systems, Task Manager shows real-time details about your computer\u2019s memory, including total capacity, speed, and DDR type. This tool is helpful for identifying whether your system has enough RAM or if an upgrade is needed. It also confirms whether the memory is being recognized properly by the system."],["What is a key advantage of DDR5 over previous generations?",["It uses more power.","It has fewer pins.","It supports higher speeds and bandwidth.","It is compatible with older motherboards."],2,"DDR5 memory offers significantly faster data transfer rates and greater bandwidth than DDR4, making it ideal for demanding tasks like gaming, video editing, and AI processing. It also uses slightly less power, improving efficiency in high-performance systems."],["Which type of RAM detects and corrects memory errors?",["Non-ECC RAM","Buffered RAM","ECC RAM","Registered RAM"],2,"ECC (Error-Correcting Code) RAM is designed to detect and automatically correct minor memory errors. This makes it ideal for servers, workstations, and systems where data accuracy and stability are critical."],["What is the primary benefit of dual-channel memory over single-channel memory?",["Increased memory bandwidth","Lower power consumption","Compatibility with older DDR generations","Increased RAM storage capacity"],0,"Dual-channel memory uses two RAM modules to double the communication bandwidth between the memory and the CPU. This leads to faster data transfers and better performance in multitasking, gaming, and professional applications. The system must have RAM installed in the correct slots to enable this mode."],["A PC builder is installing RAM but notices the system only recognizes half of the installed memory. What is the most likely cause?",["The RAM sticks are different brands","The RAM is installed in the wrong slots","The motherboard does not support DDR5","The CPU is overheating"],1,"Many motherboards require RAM to be installed in specific slots to enable dual- or quad-channel configurations. If the RAM sticks are placed incorrectly, the system may still boot, but it might only recognize part of the memory or run in single-channel mode. Always consult the motherboard manual for proper placement."],["How can you verify that RAM is running in dual-channel mode?",["Open Device Manager \u2192 Memory","Open Task Manager \u2192 Performance Tab \u2192 Memory","Run Windows Memory Diagnostic","Check the power supply"],1,"The Task Manager in Windows provides real-time memory usage details, including whether the system is using single- or dual-channel mode. This is an easy way to confirm if RAM has been installed properly and is performing at full potential without needing third-party tools."],["What should you check first if a newly installed RAM module is not detected?",["Reseat the RAM modules and check motherboard manual","Check the graphics card driver","Upgrade the CPU","Reinstall Windows"],0,"A common reason RAM isn't detected is that it's not fully seated in the slot, or it\u2019s installed in the wrong configuration. Gently remove and reinstall the module, making sure it clicks into place. The motherboard manual will show the correct slots to use for optimal performance and compatibility."],["What is the primary purpose of Virtual RAM? T",["o act as a cache for the CPU","To store system backups","To extend available memory by using disk space","To increase graphics processing power"],2,"Virtual RAM, also known as swap space, allows the computer to use part of the hard drive or SSD as extra memory when physical RAM is full. This helps the system keep running instead of crashing, though it is much slower than real RAM."],["What is the name of the Virtual RAM file used by Windows?",["virtual.mem","pagefile.sys","swap.sys","vmcache.dat"],1,"Windows uses a file called pagefile.sys to handle virtual memory. When physical RAM runs out, data is temporarily moved to this file, giving the system more working space during heavy multitasking or large application use."],["Which of the following is a downside of relying too much on Virtual RAM?",["Increased CPU temperature","Slower overall system performance","Permanent data loss","Reduced Wi-Fi signal"],1,"Virtual RAM is stored on a hard drive or SSD, which is much slower than RAM. If the system uses it too often, it can cause noticeable lag or freezing, especially during demanding tasks like gaming or editing."],["On Linux and macOS, what is the equivalent of the Windows page file?",["Tempfs","Swap space","Systemd-mem","SysTemp space"],1,"Swap space in Linux and macOS serves the same purpose as Windows' pagefile\u2014it provides virtual memory when RAM is full. This space can be a dedicated partition or a file and helps prevent crashes when memory is maxed out."],["When should a technician consider increasing the size of Virtual RAM?",["When the CPU is overheating","When the computer is frequently running out of disk space","When the system regularly freezes or slows under memory load","When installing a second GPU"],2,"If a system with limited physical RAM frequently slows down or becomes unresponsive, increasing virtual memory can help. This is especially useful for older computers or systems that run many programs at once."],["What is the primary purpose of the actuator arm in an HDD?",["Spins the platters","Moves the read/write heads","Stores magnetic data","Controls the power supply"],1,"The actuator arm is a mechanical component that moves the read/write heads back and forth across the surface of the spinning platters. This movement allows the heads to find the correct location to read or write data. It's like the needle on a record player, but much faster and more precise."],["What is a common spindle speed for desktop HDDs?",["5,400 RPM","7,200 RPM","10,000 RPM","15,000 RPM"],1,"7,200 revolutions per minute (RPM) is the standard speed for most desktop hard drives. This speed offers a good balance between performance and cost, making it ideal for everyday computing. Slower drives, like 5,400 RPM, are often used in laptops to save power."],["Why are HDDs more prone to failure than SSDs?",["HDDs have more storage capacity","HDDs have moving parts","HDDs require an external power source","HDDs are smaller in size"],1,"Hard drives have moving parts, including spinning platters and the actuator arm. These parts can wear out, break, or become misaligned over time, especially if the drive is dropped or used heavily. SSDs, on the other hand, have no moving parts, which makes them more durable and shock-resistant."],["What happens when an HDD\u2019s platters stop spinning?",["Data access speeds increase","The drive stops functioning","The HDD switches to SSD mode","The read/write heads move faster"],1,"An HDD stores data on magnetic platters that must spin for the read/write heads to access data. If the platters stop spinning\u2014due to motor failure or power loss, the drive becomes completely unusable. No spinning means no data movement, and therefore no functionality."],["How long do HDDs typically last before failure?",["6 months","1-3 years","3-7 years","10-15 years"],2,"Most HDDs last between 3 and 7 years, depending on how they\u2019re used and how well they\u2019re maintained. Factors like heat, dust, movement, and constant read/write activity can shorten a drive\u2019s life. Regular backups are important because failure can happen suddenly with little warning."],["What is a primary advantage of SSDs over HDDs?",["Lower cost per gigabyte","Faster read/write speeds","Requires more power","Uses magnetic storage"],1,"SSDs use flash memory to store data, which allows them to access and transfer files much faster than HDDs that rely on spinning platters. This results in quicker boot times, faster application loading, and overall improved system responsiveness."],["What does TRIM do in an SSD?",["Prevents overheating","Clears unused data blocks","Increases NAND wear","Disables SSD caching"],1,"TRIM is a command that helps SSDs manage deleted data by telling the drive which blocks are no longer in use. This allows the SSD to clean up and prepare those blocks for future writes, keeping performance consistent over time."],["How does wear-leveling extend SSD lifespan?",["By moving frequently accessed data to HDD storage","By preventing data from being written to the same memory cells repeatedly","By cooling the SSD","By increasing NAND cell voltage"],1,"SSDs have a limited number of write cycles per memory cell. Wear-leveling spreads out write operations evenly across all cells, reducing the chance that any one area wears out prematurely. This helps maintain long-term reliability and performance."],["Which SSD interface provides the highest potential speeds?",["SATA","NVMe","USB","mSATA"],1,"NVMe (Non-Volatile Memory Express) drives use the PCIe interface, which allows for extremely high data transfer speeds compared to older interfaces like SATA. NVMe is ideal for demanding tasks like gaming, video editing, and large file transfers."],["Why do SSDs consume less power than HDDs?",["They use spinning platters more efficiently","They rely on magnetic fields to store data","They have no moving parts","They generate more heat, reducing power draw"],2,"SSDs are completely electronic, using memory chips instead of spinning disks or moving read/write heads. This makes them more energy-efficient, quieter, and better suited for battery-powered devices like laptops."],["Which USB version introduced speeds up to 5 Gbps?",["USB 2.0","USB 2.1","USB 3.0","USB4"],2,"USB 3.0 introduced SuperSpeed data transfer, capable of reaching up to 5 Gbps. This was a significant improvement over the much slower 480 Mbps limit of USB 2.0 and made USB 3.0 the go-to standard for high-speed external drives and peripherals."],["Which USB connector type is fully reversible?",["USB-A","USB Type-C","USB Micro-B","USB Mini-B"],1,"USB Type-C is fully reversible, meaning it can be plugged in either direction, which eliminates the frustration of trying to align the plug the \"right way up.\" It's now widely used due to its convenience and versatility across charging, data, and video functions."],["What is the maximum power output of USB Power Delivery (USB-PD)?",["10W","45W","60W","100W"],3,"USB Power Delivery allows supported USB-C ports to deliver up to 100 watts of power. This makes it possible to charge larger devices like laptops and monitors safely and efficiently through a single USB-C cable."],["Which of the following is NOT a USB feature?",["Hot-swapping","Backward compatibility","Wireless data transfer","Plug-and-play"],2,"USB is wired technology, meaning it uses cables to connect and transfer data between devices. Features like hot-swapping (plugging in without rebooting), plug-and-play, and backward compatibility are all part of USB\u2019s design. For wireless transfer, technologies like Bluetooth, Wi-Fi, or NFC are used instead."],["What is a key advantage of Thunderbolt over standard USB-C?",["It supports external GPUs and daisy-chaining multiple devices","It charges devices at higher speeds","It is compatible with all USB ports","It is used for slow-speed peripherals"],0,"Thunderbolt uses the same USB-C connector but adds extra features like PCIe support, allowing connections to external GPUs, fast storage devices, and multiple 4K monitors. It also allows daisy-chaining, which means you can connect several devices in a row using one port."],["What is the primary purpose of cooling fans inside a computer case?",["To increase power efficiency","To improve internet speed","To maintain airflow and dissipate heat","To reduce noise levels"],2,"Cooling fans are designed to move cool air into the case and push hot air out. This airflow prevents internal components like the CPU, GPU, and power supply from overheating. Without proper cooling, parts can become too hot, leading to system instability, reduced performance, or hardware damage."],["What is the function of thermal paste?",["It helps secure the CPU to the motherboard","It improves heat transfer between the CPU and cooler","It prevents dust buildup on the heatsink","It allows the CPU to run without a cooler"],1,"Thermal paste fills microscopic gaps between the surface of the CPU and the cooler. These gaps can trap air, which is a poor conductor of heat. By using thermal paste, heat is transferred much more efficiently from the CPU to the cooler, helping keep temperatures under control."],["A user installs a liquid cooler but temperatures are still high. What should they check first?",["If the case fans are running","If the radiator fans are properly oriented","If the CPU supports overclocking","If the GPU is overheating"],1,"The direction of the radiator fans is critical for moving hot air away from the radiator and out of the case. If the fans are installed backward or incorrectly, they can work against airflow instead of helping it, causing poor cooling performance and high CPU temperatures."],["A technician installs a new CPU cooler, but the system begins to overheat shortly after. What is the most likely cause?",["The CPU fan is spinning too fast","The cooler is too powerful for the CPU","Thermal paste was not applied or was applied incorrectly","The power supply is overheating"],2,"Proper application of thermal paste is essential for effective heat transfer. If the paste is missing, spread unevenly, or too much was applied, it can cause hot spots on the CPU and prevent the cooler from working properly. This often leads to immediate overheating after installation."],["What is one advantage of a 4-pin fan connector compared to a 3-pin fan connector?",["It uses less power","It is quieter at all speeds","It supports Pulse Width Modulation (PWM) for speed control","It connects directly to the power supply"],2,"A 4-pin fan connector allows the motherboard to adjust fan speeds automatically based on system temperatures. This makes cooling more efficient by increasing airflow when needed and reducing fan noise when the system is cooler."],["During which step of the CompTIA six-step troubleshooting methodology would you document the solution for future reference?",["Establish a theory of probable cause","Verify full system functionality","Identify the problem","Document findings, actions, and outcomes"],3,"Documentation is the final step after you have successfully resolved the issue and confirmed that everything is working properly. Writing down the problem, your actions, and the final fix ensures that other technicians can solve similar issues faster in the future."],["A customer reports that their prints are faded even after replacing the toner cartridge. What should the technician check next?",["Restart the print spooler","Update the printer firmware","Examine the fuser and transfer roller","Reinstall the printer driver"],2,"If replacing the toner cartridge doesn't fix faded prints, the next logical step is to check the fuser and transfer roller. These components physically bond the toner onto the paper, and if they are dirty or damaged, the toner may not stick properly, resulting in faded output."],["A user reports that their laptop will not boot. The screen is black, and there are no startup sounds. What should the technician check first?",["a) The boot order in the BIOS","The print spooler status","The AC adapter and power connection","System restore settings"],2,"If the laptop is completely unresponsive \u2014 no lights, no sounds, no screen activity \u2014 the most likely cause is a power problem, not a software issue. The first step should always be to check the AC adapter, the power cable, and the battery connection."],["What is the primary function of POST in the boot process?",["Load the operating system","Test hardware components","Manage user login","Display the BIOS menu"],1,"POST (Power-On Self-Test) is the very first step after a computer is powered on. It checks key hardware components like RAM, CPU, and storage to make sure they are working properly. If something fails during POST, the system will alert the user with error messages or beep codes before anything else happens.2."],["Which of the following is responsible for loading the operating system?",["BIOS/UEFI","Kernel","Bootloader","RAM"],2,"The bootloader is a small but critical program that takes over after the BIOS/UEFI finishes its checks. Its main job is to locate the operating system files on the hard drive or SSD and load them into memory."],["How does UEFI improve upon BIOS?",["Provides a graphical interface","Supports larger storage drives","Allows secure boot to prevent malware infections","All of the above"],3,"UEFI (Unified Extensible Firmware Interface) is a modern replacement for the older BIOS system. It adds important features like a graphical interface for easier navigation, support for hard drives larger than 2 TB, and Secure Boot to block malware from loading before the operating system starts."],["What happens if no bootable device is found?",["The computer automatically shuts down","The system displays an error message","The BIOS/UEFI loads the operating system","The computer continues to try random devices"],1,"If the system can't find a valid bootable device, like a hard drive with Windows or Linux installed, it stops and shows an error message. This message warns the user that the system cannot continue to load the operating system."],["What is the function of the kernel in the boot process?",["Runs POST","Manages hardware and system processes","Loads the bootloader","Displays the BIOS menu"],1,"The kernel is the core part of the operating system that takes control after the bootloader finishes its job. It manages the computer's hardware, loads necessary drivers, and starts essential system services. Without the kernel, the system would not be able to talk to devices like the hard drive, display, or keyboard."],["What is the primary function of an operating system?",["Running software only","Managing hardware and software","Providing internet access","Increasing processing speed"],1,"An operating system manages both the computer\u2019s physical components (hardware) and the software programs running on it. It acts as the middle layer that allows software to communicate with the hardware. Without an operating system, a computer would not be able to function properly or run any applications."],["Which OS is known for being open-source and customizable?",["Windows","macOS","Linux","Chrome OS"],2,"Linux is considered an open-source operating system because anyone can view, modify, and share its source code. This makes it very flexible for users who want to customize their system\u2019s behavior or appearance. In comparison, Windows and macOS keep their source code private and only allow limited changes by users."],["What does End-of-Life (EOL) mean for an OS?",["It stops working completely","It no longer receives security updates","It cannot install any software","It becomes faster"],1,"When an operating system reaches End-of-Life (EOL), it still runs but no longer receives important security patches and updates from the developer. This makes the system vulnerable to viruses, malware, and other security threats. Continuing to use an EOL system increases the risk of data loss or hacking."],["Which mobile OS is most widely used across different manufacturers?",["iOS","iPadOS","Android","macOS"],2,"Android is an open-source mobile operating system that is used by many different phone and tablet manufacturers like Samsung, Google, Motorola, and OnePlus. This wide adoption makes Android the most commonly used mobile OS in the world. In contrast, iOS and iPadOS are only available on Apple devices."],["Why is it important to update your operating system?",["To install new applications","To change the user interface","To improve security and performance","To remove old files"],2,"Updating the operating system helps close security gaps that hackers might exploit, keeping the system safe from malware and attacks. Updates can also improve how fast and smoothly a system runs by fixing bugs and improving efficiency."],["What is the primary issue with file system compatibility?",["File formats change over time","Different OSs use different file systems","All OSs use the same file system","OSs don\u2019t store files"],1,"Operating systems like Windows, macOS, and Linux each prefer their own file systems (such as NTFS, APFS, and ext4). This can create problems when trying to move data between different systems because not all OSs can fully read and write to every file system by default."],["What is a common solution for running Windows software on macOS or Linux?",["Reinstalling the OS","Using a virtual machine","Changing file systems","Modifying the registry"],1,"A virtual machine (VM) allows one operating system to run inside another, making it possible to use Windows-only programs even on macOS or Linux. The VM acts like a separate computer, isolated inside the existing system, providing flexibility without changing the main OS."],["Which network protocol is commonly used in Windows for file sharing?",["SMB","AFP","NFS","HTTP"],0,"SMB (Server Message Block) is the default network protocol used by Windows systems to share files, printers, and other resources across a network. It allows computers to access shared folders and devices easily."],["What is one risk when transferring files between Linux and Windows systems?",["The file will be deleted automatically","The file's original permissions may not be preserved","The file format will corrupt","The system clock will reset"],1,"Linux and Windows manage file permissions differently, which can cause issues when transferring files between them. A file copied from Linux to Windows might lose its original security settings, potentially exposing sensitive information or restricting access incorrectly."],["Which file system is best for sharing large files between Windows and macOS without third-party tools?",["FAT32","NTFS","ext4","exFAT"],3,"exFAT is designed to handle large files (over 4 GB) and works natively on both Windows and macOS without needing extra drivers or software. Unlike FAT32, which has a file size limit, exFAT provides greater flexibility for transferring big files like videos or large project folders."],["Which file system is best for Windows system drives?",["exFAT","NTFS","FAT32","APFS"],1,"NTFS (New Technology File System) is specifically designed for Windows and supports features like file permissions, compression, large file sizes, and journaling, which helps protect against data corruption. It is the only file system that can be used to install and run the Windows operating system."],["Why is FAT32 still widely used for external storage devices?",["It has built-in encryption","It supports very large file sizes","It is compatible with multiple Oss","It is faster than all other file systems"],2,"FAT32 is one of the oldest and most widely supported file systems, making it a popular choice for USB drives and memory cards. It can be read and written by Windows, macOS, Linux, gaming consoles, and cameras without needing extra software."],["What is a major advantage of APFS over HFS+?",["It has better support for HDDs","It offers encryption, space sharing, and snapshots","It is the default file system for Windows","It has smaller file size limits"],1,"APFS (Apple File System) was designed to take advantage of the speed and features of SSDs and other flash storage used in modern Macs. It introduces advanced features like strong built-in encryption, the ability to share space across multiple volumes, and snapshots that allow the system to quickly save and restore data"],["Which Linux file system is commonly used for desktop systems and offers journaling support?",["NTFS","XFS","ext4","FAT32"],2,"ext4 (Fourth Extended File System) is the most common file system for Linux desktop and server environments today. It includes journaling, which helps protect data by keeping a record of changes before they happen, reducing the risk of corruption during crashes or power failures."],["What should a technician do before formatting a storage device?",["Encrypt the drive","Convert it to NTFS","Adjust boot order in BIOS","Back up all important data"],3,"Formatting a drive completely erases everything stored on it, including files, programs, and partition information. Backing up data ensures that nothing important is lost during the process. It is always best practice to double-check and save critical files elsewhere before formatting any storage device."],["Which installation type removes all previous data and installs a fresh copy of the OS?",["Upgrade","Clean install","Image deployment","Repair installation"],1,"A clean install completely erases the existing operating system and all data on the drive before installing a fresh copy. This method is often used to fix serious system problems, remove viruses, or get rid of unwanted software (bloatware)."],["Which boot method is commonly used in large organizations to install an OS over the network?",["USB boot","PXE boot","External drive boot","Multiboot"],1,"PXE boot (Preboot Execution Environment) allows a computer to boot from a network server rather than from a USB or internal drive. It\u2019s useful in large organizations where multiple systems need to be set up quickly without using physical media. IT departments use PXE to streamline deployments across many machines."],["What is a major limitation of MBR partitioning?",["Only supports one partition","Limited to 2TB drives and four primary partitions","Cannot be used on SSDs","Only works with Windows 11"],1,"MBR (Master Boot Record) is an older partitioning system that can only manage drives up to 2 terabytes and supports a maximum of four primary partitions. For modern computers and larger drives, this is very limiting."],["Which installation method allows fully automated OS deployment with no user interaction?",["Recovery partition","Image deployment","Zero-touch deployment","Repair installation"],2,"Zero-touch deployment installs the operating system automatically without needing the user to answer setup questions or click through prompts. It uses pre-configured scripts and tools like Microsoft MDT or WDS to handle the entire process."],["Why is it important to check driver compatibility before upgrading an OS?",["To speed up the installation process","To ensure connected hardware functions properly","To avoid having to reinstall the OS","To bypass user account setup"],1,"Drivers are software that allow the operating system to communicate with hardware like printers, graphics cards, and network adapters. If a driver isn't compatible with the new OS, that hardware may stop working or cause errors. Checking driver compatibility before upgrading helps avoid post-installation problems"],["Which Windows edition is best suited for large enterprises requiring advanced security and management tools?",["Windows 10 Home","Windows 11 Pro","Windows 10 Enterprise","Windows 11 S Mode"],2,"Windows 10 Enterprise is designed for large organizations that need powerful tools to manage devices, users, and data securely. It includes features like BitLocker encryption, Group Policy control, Windows Defender Advanced Threat Protection, and virtualization options."],["What is a major limitation of Windows S Mode?",["It doesn\u2019t support external monitors","It restricts app installations to the Microsoft Store","It has no built-in security features","It lacks a Start Menu"],1,"Windows S Mode is focused on security and speed, especially for basic users or schools. However, it only allows apps to be installed from the Microsoft Store, which limits access to third-party applications. While this improves safety, it also reduces flexibility, which may not be ideal for more advanced users."],["Which Windows edition supports the Resilient File System (ReFS)?",["Windows 10 Home","Windows 11 Pro","Windows 10 Pro for Workstations","Windows 11 Home"],2,"ReFS (Resilient File System) is designed to protect data from corruption and support high-performance workloads, such as large-scale file servers and virtualization. It is available in advanced editions like Windows 10 Pro for Workstations and Enterprise. Home and standard Pro editions do not support ReFS natively."],["What is the key difference between an In-Place Upgrade and a Clean Install?",["An In-Place Upgrade keeps files and settings, while a Clean Install wipes everything","A Clean Install only works on SSDs","An In-Place Upgrade is required for Windows S Mode","A Clean Install does not require installation media"],0,"An In-Place Upgrade installs a new version of Windows without deleting personal files, apps, or settings. A Clean Install, on the other hand, completely erases the drive and installs a fresh copy of the OS. Clean installs are often used to fix deep system problems or start from scratch."],["Why is Trusted Platform Module (TPM) 2.0 required for Windows 11?",["It improves boot speed","It enhances security by encrypting sensitive data","It enables gaming features","It allows Windows to run on older hardware"],1,"TPM 2.0 is a small hardware chip that stores encrypted data like passwords and encryption keys. It adds an extra layer of security by protecting data at the hardware level, making it much harder for attackers to gain access to sensitive information."],["What\u2019s the key difference between a domain and a workgroup?",["Domains are for corporate environments, workgroups are for personal networks.","Workgroups require a dedicated server.","Domains require all users to have the same password.","Workgroups do not allow file sharing."],0,"A domain is typically used in business or enterprise settings and allows for centralized user and device management using a server. In contrast, a workgroup is a simpler setup for home or small networks, where each computer manages its own settings and users."],["What\u2019s a VPN used for?",["Playing video games faster.","Securing data over a public network.","Replacing a firewall.","Speeding up Wi-Fi connections."],1,"A VPN (Virtual Private Network) encrypts internet traffic, creating a secure tunnel between the device and a remote server. This protects sensitive information, especially when using public Wi-Fi in places like airports or cafes. It helps keep data private and shields user activity from hackers or eavesdroppers."],["Which network connection type offers the most reliable and stable performance?",["Wi-Fi","Cellular (WWAN)","Ethernet (wired)","Bluetooth tethering"],2,"Wired Ethernet connections are known for being the most stable and reliable because they are not affected by wireless interference. They also offer faster speeds and lower latency, making them ideal for tasks like gaming, streaming, or transferring large files."],["Why would you set a connection as metered in Windows?",["To prioritize video streaming over other activities.","To limit background data usage and prevent excessive updates.","To increase download speeds.","To allow only administrator accounts to access the internet."],1,"Setting a connection as metered tells Windows to treat it like a limited data plan. This stops large downloads like automatic Windows updates from occurring in the background, helping users save data. It\u2019s especially useful when connected to mobile hotspots or capped internet plans."],["What setting should you check if you can\u2019t access shared files on a network?",["Bluetooth settings","Firewall and network discovery settings","Battery saver mode","VPN configuration"],1,"If shared files aren't showing up, one of the first things to check is whether network discovery is turned on. Additionally, the firewall may be blocking file-sharing services, preventing the system from seeing or communicating with other devices."],["What does Windows Defender protect against?",["Power surges","Lost passwords","Viruses, malware, and cyber threats","Unwanted pop-up ads"],2,"Windows Defender (now called Microsoft Defender Antivirus) is a built-in security tool in Windows that protects against viruses, spyware, ransomware, and other harmful programs. It runs in the background and scans files in real time to stop threats before they cause damage."],["Why should you use a Standard User account instead of an Admin account for daily use?",["To improve internet speed","To limit malware\u2019s ability to make system changes","To allow automatic software installation","To disable Windows updates"],1,"A Standard User account doesn\u2019t have permission to install or modify system files without administrator approval. This helps protect the system from malware or unauthorized changes because harmful software can\u2019t make major changes without a prompt. It adds an extra layer of security for everyday computer use."],["Which is the most secure login method?",["Password","PIN","Biometrics (Windows Hello Face/Fingerprint)","Security questions"],2,"Biometric logins use physical traits\u2014like a fingerprint or facial recognition\u2014to unlock a device. These are much harder to guess or steal than a password or PIN. Windows Hello makes logging in both secure and fast by requiring something unique to the individual."],["What does BitLocker do?",["Speeds up Windows startup","Encrypts your entire drive to prevent unauthorized access","Blocks malware from running","Cleans unnecessary files to free up space"],1,"BitLocker protects your data by encrypting the contents of the hard drive. If the computer is lost or stolen, the files remain unreadable unless the person has the correct encryption key. This is especially important for laptops or mobile devices used outside of secure environments."],["What happens if you disable UAC (User Account Control)?",["Windows becomes faster","Software updates are blocked","Malware can install programs without your permission","Your PC automatically logs into an admin account"],2,"User Account Control (UAC) asks for permission before allowing software to make major changes to your system. Disabling it removes that extra step, which makes it easier for malware to install itself silently. Keeping UAC enabled helps prevent unauthorized or harmful changes to the operating system."],["Which command would you use to see your computer\u2019s IP address?",["dir","ipconfig","hostname","whoami"],1,"The ipconfig command displays important network information about your computer, such as its IP address, subnet mask, and default gateway. This is especially helpful when diagnosing network problems or checking connectivity. It\u2019s one of the most commonly used tools for troubleshooting internet issues."],["What does ping do?",["Checks if a website or device is reachable","Formats a disk","Shows network statistics","Displays your user profile"],0,"The ping command sends small test packets to another device or website to see if it responds. If a response is received, it confirms that the connection is working. It's often used to check internet connectivity or whether another computer is active on the network."],["Which command deletes a file without sending it to the Recycle Bin?",["del","rm","erase","remove"],0,"The del command permanently deletes a file from the command line. Unlike deleting through File Explorer, it does not move the file to the Recycle Bin\u2014the file is gone immediately. This makes it a powerful but potentially risky command if used without caution."],["What does chkdsk do?",["Formats a hard drive","Checks and fixes disk errors","Displays a list of files","Shows network settings"],1,"chkdsk (Check Disk) is a tool used to scan a hard drive for file system errors or bad sectors. It can also attempt to fix problems it finds, helping to prevent crashes or data loss. It\u2019s useful when a drive is acting strange or files become inaccessible."],["Which command would you use to create a new folder?",["mkdir","touch","folder","cd"],0,"The mkdir (or md) command is used to create a new directory (folder) in the current location. It\u2019s commonly used when organizing files in a command-line environment. For example, mkdir MyFolder creates a new folder named MyFolder."],["What is the core of the Linux operating system?",["GUI","Kernel","File System",""],1,"The kernel is the heart of the Linux operating system. It handles communication between the software and the hardware, such as memory, CPU, and devices. It also manages system resources, allowing multiple processes to run at the same time without conflict. Without the kernel, the OS wouldn't function."],["Which Linux distribution is best for beginners?",["Kali Linux","Arch Linux","Ubuntu","Fedora"],2,"Ubuntu is one of the most beginner-friendly Linux distributions. It has a user- friendly interface, strong community support, and wide compatibility with hardware and software. It's a great starting point for users who are new to Linux and want a system that \"just works\" out of the box."],["What is a key difference between Linux and Windows?",["Linux is closed-source, Windows is open-source","Linux allows complete customization, Windows does not","Windows is free, Linux is paid","Linux cannot run a graphical interface"],1,"One of Linux\u2019s biggest strengths is that users can customize almost every aspect of the system\u2014from the desktop environment to system behavior. In contrast, Windows restricts much of its interface and functionality to maintain consistency."],["Which of the following is NOT a Linux distribution?",["Fedora","Debian","CentOS","macOS ."],3,"macOS is Apple\u2019s proprietary operating system and is not based on Linux. While macOS shares some Unix-like foundations, it is built on a different architecture (Darwin, based on BSD). Fedora, Debian, and CentOS are all examples of Linux distributions used for desktops, servers, or development."],["Which package manager is used by Ubuntu?",["dnf","apt","yum","pacman"],1,"apt (Advanced Package Tool) is the command-line package manager used by Ubuntu and other Debian-based Linux distributions. It allows users to install, update, and remove software quickly from official repositories. Commands like apt install and apt update make managing software simple and efficient."],["Which command shows your current directory?",["ls","pwd","cd","rm"],1,"The pwd command stands for \"print working directory.\" It shows the full path to your current location in the file system. This is helpful when you're navigating through multiple folders and want to confirm where you are. It does not list files\u2014it only shows your current directory path."],["How do you create a new folder named Projects?",["touch Projects","mkdir Projects","ls Projects","cd Projects"],1,"The mkdir command stands for \"make directory.\" It\u2019s used to create a new folder in your current location. For example, running mkdir Projects will create a folder named \u201cProjects\u201d in the current directory. This is useful for organizing files into separate folders."],["What does rm -r Folder do?",["Renames a folder","Deletes a folder and all its contents","Copies a folder to another location","Moves a folder to the trash"],1,"The rm command deletes files and folders. The -r flag stands for \"recursive,\" which means it deletes the folder and everything inside it, including subfolders and files. Be careful\u2014 this is a permanent deletion with no recovery from the Recycle Bin."],["Which command lists all files, including hidden ones?",["ls","ls -a","ls -l","ls -h"],1,"By default, the ls command lists only visible files. Adding the -a option (as in ls -a) shows all files, including hidden files that start with a dot (.), like .bashrc. Hidden files often store configuration settings and are not shown unless requested."],["How do you rename a file in Linux?",["rename file1.txt file2.txt","mv file1.txt file2.txt","cp file1.txt file2.txt","touch file1.txt file2.txt"],1,"The mv command stands for \"move,\" but it's also commonly used to rename files or folders. When you run mv file1.txt file2.txt, it changes the name from file1.txt to file2.txt. It doesn\u2019t create a new file\u2014just updates the existing file\u2019s name."],["Which command opens a text file for editing?",["nano","find","grep","edit"],0,"nano is a beginner-friendly text editor. Explanation: The nano command opens a simple text editor directly in the terminal. It's commonly used to create or edit text files and is ideal for beginners due to its straightforward interface and on-screen shortcuts."],["What does grep -i 'error' logfile.txt do?",["Searches for \"ERROR\" only in uppercase","Searches for \"error\" (case-insensitive) in logfile.txt","Lists all files containing the word \"error\"","Deletes the word \"error\" from the file"],1,"The -i option in grep tells the command to ignore case sensitivity. This means it will match \"error\", \"Error\", \"ERROR\", or any other variation in capitalization found in logfile.txt."],["Which command finds a file named data.csv inside /home/user?",["nano data.csv","grep 'data.csv' /home/user","find /home/user -name 'data.csv'","ls /home/user | grep 'data.csv'"],2,"The find command is used to search through directories for files that match specific criteria. In this case, it searches the /home/user directory for a file named data.csv, making it a precise and efficient way to locate files by name."],["How do you search for files larger than 100MB?",["grep 100MB /","find / -size +100M","nano --size 100MB","ls -lh | grep 100MB"],1,"Using -size +100M with the find command tells it to look for files larger than 100 megabytes. This is useful when managing storage space or identifying large files that may need to be archived or deleted."],["Which command finds all .log files in /var/log/?",["grep '.log' /var/log/","find /var/log -type f -name '*.log'","nano /var/log/*.log","ls -l /var/log/ | grep '.log'"],1,"When searching for files, find /var/log -type f -name '*.log' returns only files (not directories) that end in .log. This combination of options is commonly used when scanning log directories for specific file types."],["Which command shows real-time system performance?",["htop","ls","ps","chmod"],0,"The htop command provides a live, interactive view of system resources such as CPU, memory, and running processes. It\u2019s more user-friendly than the traditional top command because it includes color-coded graphs and allows you to scroll and sort easily. This makes it ideal for monitoring system performance in real time."],["How do you terminate a process with PID 1234?",["delete 1234","kill 1234","shutdown 1234","chmod -x 1234"],1,"The kill command sends a termination signal to a process using its PID (Process ID). This is useful when a program is unresponsive or consuming too many system resources. For example, kill 1234 would attempt to stop the process with the ID number 1234."],["What does chmod +x script.sh do?",["Deletes the script","Gives execute permissions","Changes the file owner","Stops the script from running"],1,"The +x flag adds execute permission to the file, allowing it to be run as a script. Without this permission, even if the file contains valid commands, the system won\u2019t allow it to run directly. This is especially important when creating or running custom scripts in Linux."],["Which command changes file ownership?",["chown","chmod","killall","ps aux"],0,"The chown command stands for \"change ownership.\" It is used to assign a new owner or group to a file or directory. For example, sudo chown user file.txt changes the owner of file.txt to the specified user."],["How do you see all running processes?",["ps aux","top","htop","All of the above"],3,"Commands like ps aux, top, and htop all show currently running processes but in different formats. ps aux provides a snapshot in list form, top offers a dynamic, updating view, and htop adds color and easier navigation. Each is useful depending on the situation and user preference."],["Which file system is best suited for general-purpose Linux use?",["XFS","ext4","FAT32","NTFS"],1,"The ext4 file system is the default for many Linux distributions because it offers a good balance of speed, reliability, and flexibility. It supports large files, journaling for data recovery, and has wide compatibility across tools and utilities."],["Which file system is designed for handling large amounts of data efficiently?",["ext4","XFS","FAT32","exFAT"],1,"XFS is designed for high-performance environments, especially those working with large files like media archives, databases, and backups. It handles data allocation more efficiently than ext4 in some enterprise use cases, and it\u2019s commonly used on servers where speed and scalability matter most."],["What does fsck do?",["Checks and repairs a filesystem","Mounts a USB drive","Lists available storage devices","Formats a partition"],0,"The fsck command stands for \u201cfile system check.\u201d It scans a file system for errors like corrupted data blocks, missing files, or bad sectors, and attempts to fix them. This helps prevent data loss and system crashes, especially after improper shutdowns or hardware failures."],["Before running fsck, what must you do first?",["Unmount the filesystem","Delete the partition","Restart the system","Run chmod"],0,"Running fsck on a file system that is still mounted can lead to data corruption, because the file system might still be actively writing data. Unmounting ensures the system is not in use during the repair process, making it safe to scan and fix."],["Which command is used to attach a storage device to a directory?",["lsblk","mount","fsck","mkfs"],1,"The mount command tells the operating system to make a storage device, like a USB or hard drive, accessible through a directory. Once mounted, the system treats the device as part of the file system, allowing files to be read or written like any other folder."],["What is the correct command to unmount a storage device?",["umount /mnt/usb","unmount /mnt/usb","fsck /mnt/usb","detach /mnt/usb"],0,"The umount command safely disconnects a mounted storage device, ensuring that all data is properly saved before removal. Skipping this step can lead to data corruption, especially on USB drives or external storage."],["Which command lists all available storage devices and partitions?",["lsblk","fsck","chmod","grep"],0,"The lsblk command provides a visual layout of connected block devices, including hard drives, SSDs, USBs, and their partitions. It\u2019s useful for identifying device names, mount points, and file system types before formatting or mounting."],["Which command allows you to switch users in Linux?",["sudo","su","switch","login"],1,"The su command stands for \"substitute user\" and is most often used to switch to the root user or another user account. When you run su, you're temporarily logging into a different account within the same terminal session."],["Which package manager is used on Ubuntu?",["dnf","apt","yum","pkg"],1,"apt is the package manager used on Ubuntu and other Debian-based systems. It helps users install new programs, update existing ones, and remove software\u2014all through simple commands in the terminal. Think of it like an app store for your system that works entirely from the command line."],["Which command checks network connectivity?",["ping","curl","dig","traceroute"],0,"The ping command checks if another computer or website is reachable by sending small packets of data and waiting for a reply. It also tells you how fast the response is, which helps you understand if there's a delay or issue with the connection. It's often the first tool used when troubleshooting network problems."],["Which file contains the list of local user accounts in Linux?",["/etc/shadow","/etc/users","/etc/passwd","/etc/login"],2,"The /etc/passwd file holds important information about all local user accounts on the system, such as usernames, user IDs (UIDs), and default shells. While it used to contain password data too, that's now stored in a more secure file called /etc/shadow."],["What does the command sudo allow you to do?",["Switch to another user","Run a command with root privileges","Restart your terminal","Change file ownership"],1,"The sudo command stands for \"superuser do\" and allows a regular user to run commands with administrative (root) privileges. This is useful for tasks like installing software or changing system settings."],["Which macOS feature allows you to view all open apps and desktops?",["Spotlight","Finder","Mission Control","Time Machine"],2,"Mission Control is a feature that gives you a bird\u2019s-eye view of everything currently open on your Mac\u2014including windows, full-screen apps, and additional desktops. It helps you switch between tasks quickly and stay organized. You can access it by pressing F3 or using a multi-touch gesture."],["How do you quickly search for apps, files, or settings in macOS?",["Using Finder","Using Spotlight (Cmd + Space)","Opening System Preferences","Asking Siri"],1,"Spotlight is a powerful search tool built into macOS that helps you instantly find apps, documents, emails, and system settings. Just press Command + Space and start typing what you\u2019re looking for. It\u2019s one of the fastest ways to access anything on your Mac without using menus."],["What is Time Machine used for?",["Restoring deleted files","Searching for files","Managing windows","Changing security settings"],0,"Time Machine is mac
