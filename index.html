<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A+ 1200 Quest</title>
<meta name="description" content="A CompTIA A+ Core 1200 series study game with topic-filtered practice rounds.">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="A+ Quest">
<style>
  :root {
    --bg: #0f172a;
    --panel: #1e293b;
    --panel2: #0f1729;
    --border: #334155;
    --blue: #3b82f6;
    --blue-dark: #2563eb;
    --green: #16a34a;
    --red: #dc2626;
    --purple: #a78bfa;
    --yellow: #facc15;
    --orange: #fb923c;
    --text: #f8fafc;
    --muted: #94a3b8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 24px 16px;
    padding: max(24px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    overflow-x: hidden;
  }
  .wrap { width: 100%; max-width: 720px; }
  @media (max-width: 480px) {
    body { padding: 14px 10px; }
    .panel { padding: 16px; border-radius: 12px; }
    h1 { font-size: 1.6rem; }
    .qbox { padding: 16px; font-size: 1.05rem; }
    .statbar { padding: 12px; gap: 8px; }
    button.primary { padding: 14px 28px; width: 100%; }
  }
  .center-screen {
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  h1 { color: var(--blue); font-size: 2.2rem; font-weight: 800; margin: 0 0 12px; }
  .subtitle { color: var(--muted); max-width: 520px; margin: 0 auto 10px; }
  .subtitle.small { font-size: 0.9rem; color: #64748b; margin-bottom: 28px; }
  button.primary {
    background: var(--blue-dark);
    color: white;
    font-weight: 700;
    border: none;
    padding: 16px 40px;
    border-radius: 10px;
    font-size: 1.1rem;
    cursor: pointer;
    transition: background 0.2s;
    box-shadow: 0 0 20px rgba(59,130,246,0.5);
  }
  button.primary:hover { background: var(--blue); }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .statbar {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    background: var(--panel2);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 22px;
    text-align: center;
  }
  @media (min-width: 480px) {
    .statbar { grid-template-columns: repeat(4, 1fr); }
  }
  .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); display: block; }
  .stat-value { font-weight: 700; font-size: 1.05rem; }
  .qheader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .qheader h2 { font-size: 1.15rem; color: #e2e8f0; margin: 0; }
  .streak { font-size: 0.85rem; font-weight: 700; color: var(--orange); }
  .qbox {
    background: #334155;
    padding: 22px;
    border-radius: 10px;
    font-size: 1.15rem;
    margin-bottom: 20px;
    line-height: 1.4;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    text-align: left;
    background: #334155;
    border: 1px solid #475569;
    color: var(--text);
    padding: 14px 16px;
    min-height: 48px;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    width: 100%;
  }
  .opt:hover:not(:disabled) { background: var(--blue-dark); border-color: var(--blue); }
  .opt:disabled { cursor: default; }
  .opt.selected { background: var(--blue-dark); border-color: var(--blue); border-width: 2px; }
  .opt.correct { background: #15803d; border-color: #4ade80; border-width: 2px; }
  .opt.wrong { background: #b91c1c; border-color: #f87171; border-width: 2px; }
  .opt.dim { opacity: 0.45; }
  .opt > span:first-child { flex: 1; min-width: 0; overflow-wrap: break-word; }
  .opt .unselect-hint { font-size: 0.72rem; color: #bfdbfe; opacity: 0.85; white-space: nowrap; }
  .actions-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    flex-wrap: wrap;
  }
  button.submit-btn {
    background: var(--green);
    color: white;
    border: none;
    font-weight: 700;
    padding: 12px 24px;
    min-height: 44px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
    flex: 1;
  }
  button.submit-btn:disabled { background: #475569; cursor: not-allowed; opacity: 0.6; }
  button.submit-btn:hover:not(:disabled) { background: #22c55e; }
  .topbar {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 8px;
  }
  button.menu-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 8px 14px;
    min-height: 40px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  button.menu-btn:hover { color: var(--text); border-color: var(--muted); }
  .topic-list { display: flex; flex-direction: column; gap: 8px; margin: 18px 0; text-align: left; }
  .topic-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #334155;
    border: 1px solid #475569;
    border-radius: 10px;
    padding: 12px 16px;
    cursor: pointer;
    min-height: 48px;
  }
  .topic-item input { width: 20px; height: 20px; flex-shrink: 0; accent-color: var(--blue); }
  .topic-item .topic-name { flex: 1; font-weight: 600; font-size: 0.95rem; }
  .topic-item .topic-count { font-size: 0.8rem; color: var(--muted); }
  .topic-toolbar { display: flex; gap: 10px; justify-content: center; margin-bottom: 4px; }
  .topic-toolbar button {
    background: transparent;
    color: var(--blue);
    border: 1px solid var(--blue-dark);
    padding: 8px 16px;
    min-height: 40px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
  }
  .topic-toolbar button:hover { background: var(--blue-dark); color: white; }

  /* Start menu grid */
  .menu-grid { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 340px; margin: 8px auto 0; }
  .menu-grid button.secondary {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    min-height: 48px;
  }
  .menu-grid button.secondary:hover { border-color: var(--blue); background: #253449; }

  /* Reference hub + detail screens */
  .ref-hub { display: flex; flex-direction: column; gap: 12px; margin: 10px 0; }
  .ref-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #334155;
    border: 1px solid #475569;
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    text-align: left;
    min-height: 56px;
  }
  .ref-card:hover { border-color: var(--blue); }
  .ref-card .ref-icon { flex-shrink: 0; width: 48px; height: 48px; }
  .ref-card .ref-icon svg { width: 100%; height: 100%; }
  .ref-card .ref-title { font-weight: 700; font-size: 1.05rem; }
  .ref-card .ref-sub { font-size: 0.82rem; color: var(--muted); margin-top: 2px; }

  .detail-card {
    background: #334155;
    border: 1px solid #475569;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    text-align: left;
  }
  .detail-card .detail-head { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
  .detail-card .detail-icon { flex-shrink: 0; width: 56px; height: 56px; background: #1e293b; border-radius: 8px; padding: 4px; }
  .detail-card .detail-icon svg { width: 100%; height: 100%; }
  .detail-card h3 { margin: 0; font-size: 1.05rem; color: #e2e8f0; }
  .spec-row { display: flex; gap: 8px; font-size: 0.85rem; padding: 4px 0; border-top: 1px solid #475569; }
  .spec-row:first-of-type { border-top: none; }
  .spec-row .spec-label { color: var(--muted); flex: 0 0 90px; font-weight: 600; }
  .spec-row .spec-value { color: #cbd5e1; flex: 1; }

  .process-list { display: flex; flex-direction: column; gap: 8px; text-align: left; margin: 10px 0; }
  .process-step { display: flex; gap: 10px; background: #334155; border-radius: 10px; padding: 10px 14px; align-items: flex-start; }
  .process-step .step-num {
    flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%;
    background: var(--blue-dark); color: white; font-weight: 700; font-size: 0.85rem;
    display: flex; align-items: center; justify-content: center;
  }
  .process-step .step-body strong { display: block; font-size: 0.92rem; }
  .process-step .step-body span { font-size: 0.8rem; color: var(--muted); }

  .tt-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.85rem; }
  .tt-table th, .tt-table td { padding: 8px 6px; border-bottom: 1px solid #475569; vertical-align: top; }
  .tt-table th { color: var(--muted); font-size: 0.75rem; text-transform: uppercase; }

  /* PBQ practice mode */
  .pbq-prompt { background: #334155; padding: 16px; border-radius: 10px; margin-bottom: 16px; font-size: 1rem; line-height: 1.4; text-align: left; }
  .pbq-section-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); margin: 14px 0 8px; text-align: left; }
  .pbq-slots { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
  .pbq-slot {
    display: flex; align-items: center; gap: 10px;
    min-height: 46px; border-radius: 10px; padding: 10px 14px;
    background: #1e293b; border: 1px dashed #475569; text-align: left; cursor: pointer;
  }
  .pbq-slot.filled { background: #334155; border: 1px solid var(--blue); cursor: pointer; }
  .pbq-slot.correct { background: #15803d; border-color: #4ade80; }
  .pbq-slot.incorrect { background: #b91c1c; border-color: #f87171; }
  .pbq-slot .slot-num { flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%; background: #475569; color: white; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .pbq-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .pbq-chip {
    background: #334155; border: 1px solid #475569; color: var(--text);
    padding: 10px 14px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; min-height: 40px;
  }
  .pbq-chip:hover { border-color: var(--blue); }
  .pbq-match-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .pbq-match-left {
    flex: 1; min-width: 0; background: #334155; border: 1px solid #475569; border-radius: 10px;
    padding: 10px 12px; font-size: 0.88rem; cursor: pointer; min-height: 44px; display: flex; align-items: center;
  }
  .pbq-match-left.active { border-color: var(--blue); background: var(--blue-dark); }
  .pbq-match-left.paired { border-color: #4ade80; }
  .pbq-match-left.correct { background: #15803d; border-color: #4ade80; }
  .pbq-match-left.incorrect { background: #b91c1c; border-color: #f87171; }
  .pbq-match-arrow { color: var(--muted); flex-shrink: 0; }
  .pbq-match-right-slot {
    flex: 1; min-width: 0; font-size: 0.82rem; color: var(--muted); padding: 6px 8px;
    border: 1px dashed #475569; border-radius: 8px; min-height: 32px; display: flex; align-items: center;
  }
  .pbq-options { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .pbq-option-chip.used { opacity: 0.35; pointer-events: none; }
  .pbq-progress { font-size: 0.8rem; color: var(--muted); margin-bottom: 6px; text-align: left; }

  .explain {
    margin-top: 18px;
    padding: 16px;
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .explain .verdict { font-weight: 700; margin: 0 0 8px; }
  .verdict.good { color: #4ade80; }
  .verdict.bad { color: #f87171; }
  .explain p.body { color: #cbd5e1; font-size: 0.92rem; line-height: 1.5; margin: 0; }
  button.next {
    margin-top: 16px;
    background: var(--blue-dark);
    color: white;
    border: none;
    font-weight: 700;
    padding: 10px 24px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.95rem;
  }
  button.next:hover { background: var(--blue); }
  .result-title { font-size: 2.5rem; font-weight: 800; margin-bottom: 14px; }
  .result-title.win { color: #4ade80; }
  .result-title.lose { color: #f87171; }
  .result-line { font-size: 1.05rem; margin: 4px 0; color: var(--muted); }
</style>
</head>
<body>
<div class="wrap" id="app"></div>

<script src="data.js"></script>
<script src="cable_data.js"></script>
<script src="printer_data.js"></script>
<script src="pbq_data.js"></script>
<script>
(function () {
  const TOTAL_QUESTIONS_PER_RUN = 15;
  const LEVEL_TITLES = ["Help Desk Trainee", "Help Desk Analyst", "IT Support Specialist", "SysAdmin", "Network Engineer"];
  const DOMAIN_ORDER = [
    "Mobile Devices",
    "Networking",
    "Hardware",
    "Virtualization and Cloud Computing",
    "Hardware and Network Troubleshooting",
    "Operating Systems",
    "Security",
    "Software Troubleshooting",
    "Operational Procedures",
  ];

  const app = document.getElementById('app');

  function domainCounts() {
    const counts = {};
    QUESTION_BANK.forEach(q => { counts[q[4]] = (counts[q[4]] || 0) + 1; });
    return counts;
  }

  let state = {
    runQuestions: [],
    currentQuestion: 0,
    score: 0,
    lives: 3,
    streak: 0,
    bestStreak: 0,
    coins: 0,
    selected: null,
    submitted: false,
    selectedDomains: new Set(DOMAIN_ORDER),
    screen: 'start', // start | topics | playing | gameover | gamewon | reference | cabling | printers | pbq | pbq-done
    // PBQ practice state
    pbqQueue: [],
    pbqIndex: 0,
    pbqScore: 0,
    pbqSubmitted: false,
    pbqOrderAvailable: [], // indices into current exercise's items, not yet placed
    pbqOrderChosen: [],    // indices into current exercise's items, in chosen order
    pbqMatchRightOrder: [], // shuffled indices into current exercise's pairs (right-hand column)
    pbqMatchPairs: {},     // leftIndex -> rightOrderPosition
    pbqMatchActiveLeft: null,
  };

  function range(n) { return Array.from({ length: n }, (_, i) => i); }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function shuffleQuestion(item) {
    const q = item[0], opts = item[1], correctIdx = item[2], exp = item[3];
    const order = shuffle([0, 1, 2, 3]);
    const newOpts = order.map(i => opts[i]);
    const newCorrect = order.indexOf(correctIdx);
    return { question: q, options: newOpts, answer: newCorrect, explanation: exp };
  }

  function buildRun() {
    const pool = range(QUESTION_BANK.length).filter(i => state.selectedDomains.has(QUESTION_BANK[i][4]));
    const shuffled = shuffle(pool);
    const perRun = Math.min(TOTAL_QUESTIONS_PER_RUN, shuffled.length);
    state.runQuestions = shuffled.slice(0, perRun).map(idx => shuffleQuestion(QUESTION_BANK[idx]));
  }

  function goToTopics() {
    state.screen = 'topics';
    render();
  }

  function toggleDomain(name) {
    if (state.selectedDomains.has(name)) state.selectedDomains.delete(name);
    else state.selectedDomains.add(name);
    render();
  }

  function selectAllDomains() {
    state.selectedDomains = new Set(DOMAIN_ORDER);
    render();
  }

  function clearAllDomains() {
    state.selectedDomains = new Set();
    render();
  }

  function startGame() {
    if (state.selectedDomains.size === 0) return;
    buildRun();
    state.currentQuestion = 0;
    state.score = 0;
    state.lives = 3;
    state.streak = 0;
    state.bestStreak = 0;
    state.coins = 0;
    state.selected = null;
    state.submitted = false;
    state.screen = 'playing';
    render();
  }

  function goHome() {
    if (state.screen === 'playing' && (state.currentQuestion > 0 || state.selected !== null)) {
      if (!confirm('Quit this round and return to the start menu? Your progress in this run will be lost.')) return;
    }
    if (state.screen === 'pbq' && state.pbqIndex > 0) {
      if (!confirm('Quit PBQ practice and return to the start menu? Your progress in this session will be lost.')) return;
    }
    state.screen = 'start';
    render();
  }

  // ---------- PBQ practice ----------

  function currentPBQ() { return PBQ_BANK[state.pbqQueue[state.pbqIndex]]; }

  function setupPBQExercise() {
    const ex = currentPBQ();
    state.pbqSubmitted = false;
    if (ex.type === 'order') {
      state.pbqOrderAvailable = shuffle(range(ex.items.length));
      state.pbqOrderChosen = [];
    } else {
      state.pbqMatchRightOrder = shuffle(range(ex.pairs.length));
      state.pbqMatchPairs = {};
      state.pbqMatchActiveLeft = null;
    }
  }

  function startPBQ() {
    state.pbqQueue = shuffle(range(PBQ_BANK.length));
    state.pbqIndex = 0;
    state.pbqScore = 0;
    setupPBQExercise();
    state.screen = 'pbq';
    render();
  }

  function pbqPickOrderItem(itemIdx) {
    if (state.pbqSubmitted) return;
    state.pbqOrderAvailable = state.pbqOrderAvailable.filter(i => i !== itemIdx);
    state.pbqOrderChosen.push(itemIdx);
    render();
  }

  function pbqRemoveOrderSlot(position) {
    if (state.pbqSubmitted) return;
    const itemIdx = state.pbqOrderChosen[position];
    state.pbqOrderChosen.splice(position, 1);
    state.pbqOrderAvailable.push(itemIdx);
    render();
  }

  function pbqCheckOrder() {
    const ex = currentPBQ();
    if (state.pbqSubmitted || state.pbqOrderChosen.length !== ex.items.length) return;
    state.pbqSubmitted = true;
    if (state.pbqOrderChosen.every((itemIdx, pos) => itemIdx === pos)) state.pbqScore += 1;
    render();
  }

  function pbqSelectLeft(leftIdx) {
    if (state.pbqSubmitted) return;
    if (Object.prototype.hasOwnProperty.call(state.pbqMatchPairs, leftIdx)) {
      delete state.pbqMatchPairs[leftIdx];
      state.pbqMatchActiveLeft = leftIdx;
    } else {
      state.pbqMatchActiveLeft = (state.pbqMatchActiveLeft === leftIdx) ? null : leftIdx;
    }
    render();
  }

  function pbqSelectRight(rightPairIdx) {
    if (state.pbqSubmitted || state.pbqMatchActiveLeft === null) return;
    const alreadyUsed = Object.values(state.pbqMatchPairs).includes(rightPairIdx);
    if (alreadyUsed) return;
    state.pbqMatchPairs[state.pbqMatchActiveLeft] = rightPairIdx;
    state.pbqMatchActiveLeft = null;
    render();
  }

  function pbqCheckMatch() {
    const ex = currentPBQ();
    if (state.pbqSubmitted || Object.keys(state.pbqMatchPairs).length !== ex.pairs.length) return;
    state.pbqSubmitted = true;
    if (ex.pairs.every((_, i) => state.pbqMatchPairs[i] === i)) state.pbqScore += 1;
    render();
  }

  function nextPBQ() {
    if (state.pbqIndex + 1 >= state.pbqQueue.length) {
      state.screen = 'pbq-done';
    } else {
      state.pbqIndex += 1;
      setupPBQExercise();
    }
    render();
  }

  function selectOption(index) {
    if (state.submitted) return;
    state.selected = state.selected === index ? null : index;
    render();
  }

  function submitAnswer() {
    if (state.submitted || state.selected === null) return;
    state.submitted = true;

    const q = state.runQuestions[state.currentQuestion];
    if (state.selected === q.answer) {
      state.score += 10;
      state.streak += 1;
      state.bestStreak = Math.max(state.bestStreak, state.streak);
      if (state.streak % 3 === 0) state.coins += 15;
    } else {
      state.streak = 0;
      state.lives -= 1;
    }
    render();
  }

  function nextQuestion() {
    state.selected = null;
    state.submitted = false;

    if (state.lives <= 0) {
      state.screen = 'gameover';
      render();
      return;
    }
    if (state.currentQuestion + 1 >= state.runQuestions.length) {
      state.screen = 'gamewon';
    } else {
      state.currentQuestion += 1;
    }
    render();
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function currentLevel() {
    return Math.min(Math.floor(state.score / 40), 4);
  }

  function render() {
    if (state.screen === 'start') return renderStart();
    if (state.screen === 'topics') return renderTopics();
    if (state.screen === 'gameover') return renderGameOver();
    if (state.screen === 'gamewon') return renderGameWon();
    if (state.screen === 'reference') return renderReferenceHub();
    if (state.screen === 'cabling') return renderCabling();
    if (state.screen === 'printers') return renderPrinters();
    if (state.screen === 'pbq') return renderPBQ();
    if (state.screen === 'pbq-done') return renderPBQDone();
    return renderPlaying();
  }

  function renderStart() {
    app.innerHTML = `
      <div class="center-screen">
        <h1>A+ 1200 Quest</h1>
        <p class="subtitle">A CompTIA A+ Core study game built from the ACI Learning A+ 1200 series eBook.</p>
        <p class="subtitle small">${QUESTION_BANK.length} unique questions pulled straight from the course's own Knowledge Checks, covering hardware, OS, networking, virtualization, security, mobile devices, and operational procedures.</p>
        <div class="menu-grid">
          <button class="primary" id="startBtn">Choose Topics &amp; Play</button>
          <button class="secondary" id="pbqBtn">Practice PBQs</button>
          <button class="secondary" id="refBtn">Study Reference</button>
        </div>
      </div>
    `;
    document.getElementById('startBtn').onclick = goToTopics;
    document.getElementById('pbqBtn').onclick = startPBQ;
    document.getElementById('refBtn').onclick = () => { state.screen = 'reference'; render(); };
  }

  function renderTopics() {
    const counts = domainCounts();
    const itemsHtml = DOMAIN_ORDER.filter(d => counts[d]).map(d => {
      const checked = state.selectedDomains.has(d) ? 'checked' : '';
      return `
        <label class="topic-item">
          <input type="checkbox" data-domain="${esc(d)}" ${checked}>
          <span class="topic-name">${esc(d)}</span>
          <span class="topic-count">${counts[d]} question${counts[d] === 1 ? '' : 's'}</span>
        </label>
      `;
    }).join('');

    const total = Array.from(state.selectedDomains).reduce((sum, d) => sum + (counts[d] || 0), 0);
    const roundSize = Math.min(TOTAL_QUESTIONS_PER_RUN, total);

    app.innerHTML = `
      <div class="center-screen">
        <h1 style="font-size:1.8rem;">Choose Your Topics</h1>
        <p class="subtitle small">Select which A+ 1200 exam domains to be quizzed on.</p>
        <div class="topic-toolbar">
          <button id="selectAllBtn">Select All</button>
          <button id="clearAllBtn">Clear All</button>
        </div>
        <div class="topic-list">${itemsHtml}</div>
        <p class="subtitle small">${total === 0 ? 'Pick at least one topic to continue.' : `Round will include ${roundSize} question${roundSize === 1 ? '' : 's'} from ${total} matching question${total === 1 ? '' : 's'}.`}</p>
        <button class="primary" id="startBtn" ${total === 0 ? 'disabled' : ''}>Start Training</button>
        <button class="menu-btn" id="backBtn" style="margin-top:12px;">Back</button>
      </div>
    `;

    document.querySelectorAll('.topic-item input').forEach(cb => {
      cb.addEventListener('change', () => toggleDomain(cb.getAttribute('data-domain')));
    });
    document.getElementById('selectAllBtn').addEventListener('click', selectAllDomains);
    document.getElementById('clearAllBtn').addEventListener('click', clearAllDomains);
    document.getElementById('backBtn').addEventListener('click', () => { state.screen = 'start'; render(); });
    const startBtn = document.getElementById('startBtn');
    if (total > 0) startBtn.addEventListener('click', startGame);
  }

  // ---------- Reference: hub, cabling, printers ----------

  function goToScreen(name) { state.screen = name; render(); }

  function renderReferenceHub() {
    app.innerHTML = `
      <div class="topbar"><button class="menu-btn" id="homeBtn">\u{1F3E0} Menu</button></div>
      <h1 style="text-align:center;font-size:1.8rem;">Study Reference</h1>
      <p class="subtitle small" style="text-align:center;">Quick-reference guides for topics that are easier to learn visually.</p>
      <div class="ref-hub">
        <button class="ref-card" id="cablingCard">
          <span class="ref-icon">${CABLE_DATA[0].svg}</span>
          <span>
            <span class="ref-title">Cabling &amp; Connectors</span>
            <span class="ref-sub">${CABLE_DATA.length} cable/connector types with specs and diagrams</span>
          </span>
        </button>
        <button class="ref-card" id="printersCard">
          <span class="ref-icon">${PRINTER_TYPES[0].svg}</span>
          <span>
            <span class="ref-title">Printers</span>
            <span class="ref-sub">Printer types, the laser imaging process, connections &amp; troubleshooting</span>
          </span>
        </button>
      </div>
    `;
    document.getElementById('homeBtn').addEventListener('click', goHome);
    document.getElementById('cablingCard').addEventListener('click', () => goToScreen('cabling'));
    document.getElementById('printersCard').addEventListener('click', () => goToScreen('printers'));
  }

  function renderCabling() {
    const cardsHtml = CABLE_DATA.map(c => `
      <div class="detail-card">
        <div class="detail-head">
          <span class="detail-icon">${c.svg}</span>
          <h3>${esc(c.name)}</h3>
        </div>
        <div class="spec-row"><span class="spec-label">Connector</span><span class="spec-value">${esc(c.connector)}</span></div>
        <div class="spec-row"><span class="spec-label">Speed</span><span class="spec-value">${esc(c.speed)}</span></div>
        <div class="spec-row"><span class="spec-label">Distance</span><span class="spec-value">${esc(c.distance)}</span></div>
        <div class="spec-row"><span class="spec-label">Used for</span><span class="spec-value">${esc(c.use)}</span></div>
      </div>
    `).join('');
    app.innerHTML = `
      <div class="topbar"><button class="menu-btn" id="homeBtn">\u{1F3E0} Menu</button></div>
      <h1 style="text-align:center;font-size:1.6rem;">Cabling &amp; Connectors</h1>
      <div>${cardsHtml}</div>
      <button class="menu-btn" id="backBtn" style="width:100%;margin-top:4px;">Back to Reference</button>
    `;
    document.getElementById('homeBtn').addEventListener('click', goHome);
    document.getElementById('backBtn').addEventListener('click', () => goToScreen('reference'));
  }

  function renderPrinters() {
    const typeCardsHtml = PRINTER_TYPES.map(p => `
      <div class="detail-card">
        <div class="detail-head">
          <span class="detail-icon">${p.svg}</span>
          <h3>${esc(p.name)}</h3>
        </div>
        <div class="spec-row"><span class="spec-label">Parts</span><span class="spec-value">${esc(p.components)}</span></div>
        <div class="spec-row"><span class="spec-label">How it works</span><span class="spec-value">${esc(p.howItWorks)}</span></div>
        <div class="spec-row"><span class="spec-label">Used for</span><span class="spec-value">${esc(p.use)}</span></div>
      </div>
    `).join('');

    const processHtml = LASER_PROCESS.map((s, i) => `
      <div class="process-step">
        <span class="step-num">${i + 1}</span>
        <span class="step-body"><strong>${esc(s.step)}</strong><span>${esc(s.detail)}</span></span>
      </div>
    `).join('');

    const connectionsHtml = PRINTER_CONNECTIONS.map(c => `
      <div class="spec-row"><span class="spec-label">${esc(c.type)}</span><span class="spec-value">${esc(c.detail)}</span></div>
    `).join('');

    const troubleshootRows = PRINTER_TROUBLESHOOTING.map(t => `
      <tr><td>${esc(t.symptom)}</td><td>${esc(t.cause)}</td></tr>
    `).join('');

    app.innerHTML = `
      <div class="topbar"><button class="menu-btn" id="homeBtn">\u{1F3E0} Menu</button></div>
      <h1 style="text-align:center;font-size:1.6rem;">Printers</h1>

      <div>${typeCardsHtml}</div>

      <div class="detail-card">
        <h3 style="margin-bottom:10px;">Laser Imaging Process (in order)</h3>
        <div class="process-list">${processHtml}</div>
      </div>

      <div class="detail-card">
        <h3 style="margin-bottom:6px;">Connection Types</h3>
        ${connectionsHtml}
      </div>

      <div class="detail-card">
        <h3 style="margin-bottom:10px;">Common Troubleshooting</h3>
        <div style="overflow-x:auto;">
          <table class="tt-table">
            <thead><tr><th>Symptom</th><th>Likely Cause</th></tr></thead>
            <tbody>${troubleshootRows}</tbody>
          </table>
        </div>
      </div>

      <button class="menu-btn" id="backBtn" style="width:100%;margin-top:4px;">Back to Reference</button>
    `;
    document.getElementById('homeBtn').addEventListener('click', goHome);
    document.getElementById('backBtn').addEventListener('click', () => goToScreen('reference'));
  }

  function renderPBQ() {
    const ex = currentPBQ();
    if (ex.type === 'order') return renderPBQOrder(ex);
    return renderPBQMatch(ex);
  }

  function renderPBQOrder(ex) {
    const slotsHtml = ex.items.map((_, pos) => {
      const itemIdx = state.pbqOrderChosen[pos];
      const filled = itemIdx !== undefined;
      let cls = 'pbq-slot';
      let label = '';
      if (filled) {
        cls += ' filled';
        label = esc(ex.items[itemIdx]);
        if (state.pbqSubmitted) cls += (itemIdx === pos) ? ' correct' : ' incorrect';
      }
      return `<div class="${cls}" data-pos="${pos}"><span class="slot-num">${pos + 1}</span><span>${label}</span></div>`;
    }).join('');

    const chipsHtml = state.pbqOrderAvailable.map(itemIdx =>
      `<button class="pbq-chip" data-item="${itemIdx}">${esc(ex.items[itemIdx])}</button>`
    ).join('');

    const allPlaced = state.pbqOrderChosen.length === ex.items.length;

    let explainHtml = '';
    if (state.pbqSubmitted) {
      const allCorrect = state.pbqOrderChosen.every((itemIdx, pos) => itemIdx === pos);
      explainHtml = `
        <div class="explain">
          <p class="verdict ${allCorrect ? 'good' : 'bad'}">${allCorrect ? 'Correct order!' : 'Not quite right.'}</p>
          <p class="body">${esc(ex.explanation)}</p>
          <button class="next" id="nextBtn">${state.pbqIndex + 1 >= state.pbqQueue.length ? 'Finish Practice' : 'Next Exercise'}</button>
        </div>
      `;
    }

    app.innerHTML = `
      <div class="topbar"><button class="menu-btn" id="homeBtn">\u{1F3E0} Menu</button></div>
      <h1 style="text-align:center;font-size:1.6rem;">PBQ Practice</h1>
      <div class="panel">
        <div class="pbq-progress">Exercise ${state.pbqIndex + 1} of ${state.pbqQueue.length} &middot; Score: ${state.pbqScore}</div>
        <div class="pbq-prompt"><strong>${esc(ex.title)}</strong><br>${esc(ex.prompt)}</div>
        <div class="pbq-section-label">Your order (tap a filled slot to remove it)</div>
        <div class="pbq-slots">${slotsHtml}</div>
        ${!state.pbqSubmitted ? `
          <div class="pbq-section-label">Tap steps in order</div>
          <div class="pbq-chips">${chipsHtml}</div>
          <div class="actions-row"><button class="submit-btn" id="checkBtn" ${allPlaced ? '' : 'disabled'}>Check Order</button></div>
        ` : ''}
        ${explainHtml}
      </div>
    `;

    document.getElementById('homeBtn').addEventListener('click', goHome);
    document.querySelectorAll('.pbq-slot.filled').forEach(el => {
      el.addEventListener('click', () => pbqRemoveOrderSlot(parseInt(el.getAttribute('data-pos'), 10)));
    });
    document.querySelectorAll('.pbq-chip').forEach(el => {
      el.addEventListener('click', () => pbqPickOrderItem(parseInt(el.getAttribute('data-item'), 10)));
    });
    const checkBtn = document.getElementById('checkBtn');
    if (checkBtn) checkBtn.addEventListener('click', pbqCheckOrder);
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn) nextBtn.addEventListener('click', nextPBQ);
  }

  function renderPBQMatch(ex) {
    const leftRowsHtml = ex.pairs.map((pair, leftIdx) => {
      const rightPairIdx = state.pbqMatchPairs[leftIdx];
      const paired = rightPairIdx !== undefined;
      let cls = 'pbq-match-left';
      if (state.pbqMatchActiveLeft === leftIdx) cls += ' active';
      else if (paired) cls += ' paired';
      if (state.pbqSubmitted) cls += (paired && rightPairIdx === leftIdx) ? ' correct' : ' incorrect';
      const rightLabel = paired ? esc(ex.pairs[rightPairIdx][1]) : 'Tap, then choose a match below';
      return `
        <div class="pbq-match-row">
          <div class="${cls}" data-left="${leftIdx}">${esc(pair[0])}</div>
          <span class="pbq-match-arrow">&rarr;</span>
          <div class="pbq-match-right-slot">${rightLabel}</div>
        </div>
      `;
    }).join('');

    const usedRightIdxs = new Set(Object.values(state.pbqMatchPairs));
    const optionsHtml = state.pbqMatchRightOrder.map(rightPairIdx => {
      const used = usedRightIdxs.has(rightPairIdx);
      return `<button class="pbq-chip pbq-option-chip ${used ? 'used' : ''}" data-right="${rightPairIdx}">${esc(ex.pairs[rightPairIdx][1])}</button>`;
    }).join('');

    const allPaired = Object.keys(state.pbqMatchPairs).length === ex.pairs.length;

    let explainHtml = '';
    if (state.pbqSubmitted) {
      const allCorrect = ex.pairs.every((_, i) => state.pbqMatchPairs[i] === i);
      explainHtml = `
        <div class="explain">
          <p class="verdict ${allCorrect ? 'good' : 'bad'}">${allCorrect ? 'All matched correctly!' : 'Not quite right.'}</p>
          <p class="body">${esc(ex.explanation)}</p>
          <button class="next" id="nextBtn">${state.pbqIndex + 1 >= state.pbqQueue.length ? 'Finish Practice' : 'Next Exercise'}</button>
        </div>
      `;
    }

    app.innerHTML = `
      <div class="topbar"><button class="menu-btn" id="homeBtn">\u{1F3E0} Menu</button></div>
      <h1 style="text-align:center;font-size:1.6rem;">PBQ Practice</h1>
      <div class="panel">
        <div class="pbq-progress">Exercise ${state.pbqIndex + 1} of ${state.pbqQueue.length} &middot; Score: ${state.pbqScore}</div>
        <div class="pbq-prompt"><strong>${esc(ex.title)}</strong><br>${esc(ex.prompt)}</div>
        ${leftRowsHtml}
        ${!state.pbqSubmitted ? `
          <div class="pbq-section-label">Available matches</div>
          <div class="pbq-options">${optionsHtml}</div>
          <div class="actions-row"><button class="submit-btn" id="checkBtn" ${allPaired ? '' : 'disabled'}>Check Matches</button></div>
        ` : ''}
        ${explainHtml}
      </div>
    `;

    document.getElementById('homeBtn').addEventListener('click', goHome);
    document.querySelectorAll('.pbq-match-left').forEach(el => {
      el.addEventListener('click', () => pbqSelectLeft(parseInt(el.getAttribute('data-left'), 10)));
    });
    document.querySelectorAll('.pbq-option-chip:not(.used)').forEach(el => {
      el.addEventListener('click', () => pbqSelectRight(parseInt(el.getAttribute('data-right'), 10)));
    });
    const checkBtn = document.getElementById('checkBtn');
    if (checkBtn) checkBtn.addEventListener('click', pbqCheckMatch);
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn) nextBtn.addEventListener('click', nextPBQ);
  }

  function renderPBQDone() {
    app.innerHTML = `
      <div class="center-screen">
        <div class="result-title win">PBQ Practice Complete!</div>
        <p class="result-line">Score: ${state.pbqScore} / ${state.pbqQueue.length} exercises fully correct</p>
        <button class="primary" id="againBtn" style="margin-top:16px;">Practice Again</button>
        <button class="menu-btn" id="homeBtn" style="margin-top:12px;">\u{1F3E0} Back to Menu</button>
      </div>
    `;
    document.getElementById('againBtn').onclick = startPBQ;
    document.getElementById('homeBtn').onclick = goHome;
  }

  function renderGameOver() {
    app.innerHTML = `
      <div class="center-screen">
        <div class="result-title lose">System Crashed!</div>
        <p class="result-line">You ran out of lives.</p>
        <p class="result-line">Final XP: ${state.score} | Title: ${LEVEL_TITLES[currentLevel()]}</p>
        <p class="result-line" style="color:var(--orange)">Best Streak: ${state.bestStreak} \u{1F525}</p>
        <button class="primary" id="restartBtn" style="margin-top:16px;">Reboot System &amp; Try Again</button>
        <button class="menu-btn" id="homeBtn" style="margin-top:12px;">\u{1F3E0} Back to Menu</button>
      </div>
    `;
    document.getElementById('restartBtn').onclick = startGame;
    document.getElementById('homeBtn').onclick = goHome;
  }

  function renderGameWon() {
    app.innerHTML = `
      <div class="center-screen">
        <div class="result-title win">Module Complete!</div>
        <p class="result-line">Final XP: ${state.score}</p>
        <p class="result-line" style="color:var(--purple)">Rank Achieved: ${LEVEL_TITLES[currentLevel()]}</p>
        <p class="result-line" style="color:var(--orange)">Best Streak: ${state.bestStreak} \u{1F525}</p>
        <p class="result-line" style="color:var(--yellow)">Tech Coins Earned: \u{1FA99} ${state.coins}</p>
        <button class="primary" id="nextRoundBtn" style="margin-top:16px;">Take Next Round</button>
        <button class="menu-btn" id="homeBtn" style="margin-top:12px;">\u{1F3E0} Back to Menu</button>
      </div>
    `;
    document.getElementById('nextRoundBtn').onclick = startGame;
    document.getElementById('homeBtn').onclick = goHome;
  }

  function renderPlaying() {
    const q = state.runQuestions[state.currentQuestion];
    if (!q) return;
    const lvl = currentLevel();
    const hearts = '\u2764\uFE0F'.repeat(state.lives) + '\u{1F5A4}'.repeat(3 - state.lives);

    const optionsHtml = q.options.map((opt, idx) => {
      let cls = 'opt';
      let hint = '';
      if (state.submitted) {
        if (idx === q.answer) cls += ' correct';
        else if (idx === state.selected) cls += ' wrong';
        else cls += ' dim';
      } else if (idx === state.selected) {
        cls += ' selected';
        hint = '<span class="unselect-hint">tap to unselect</span>';
      }
      return `<button class="${cls}" data-idx="${idx}" ${state.submitted ? 'disabled' : ''}><span>${esc(opt)}</span>${hint}</button>`;
    }).join('');

    const streakHtml = state.streak >= 2 ? `<span class="streak">\u{1F525} ${state.streak} Streak!</span>` : '';

    let explainHtml = '';
    if (state.submitted) {
      const good = state.selected === q.answer;
      explainHtml = `
        <div class="explain">
          <p class="verdict ${good ? 'good' : 'bad'}">${good ? 'Correct!' : 'Not quite.'}</p>
          <p class="body">${esc(q.explanation)}</p>
          <button class="next" id="nextBtn">${state.currentQuestion + 1 >= state.runQuestions.length ? 'Finish Round' : 'Next Question'}</button>
        </div>
      `;
    }

    const submitRowHtml = !state.submitted ? `
      <div class="actions-row">
        <button class="submit-btn" id="submitBtn" ${state.selected === null ? 'disabled' : ''}>Submit Answer</button>
      </div>
    ` : '';

    app.innerHTML = `
      <div class="topbar"><button class="menu-btn" id="homeBtn">\u{1F3E0} Menu</button></div>
      <h1 style="text-align:center;font-size:1.8rem;">A+ 1200 Quest</h1>
      <div class="panel">
        <div class="statbar">
          <div><span class="stat-label">Level &amp; Title</span><span class="stat-value" style="color:var(--purple)">Lv.${lvl + 1} ${LEVEL_TITLES[lvl]}</span></div>
          <div><span class="stat-label">XP</span><span class="stat-value" style="color:#93c5fd">${state.score}</span></div>
          <div><span class="stat-label">System Health</span><span class="stat-value" style="color:#f87171">${hearts}</span></div>
          <div><span class="stat-label">Tech Coins</span><span class="stat-value" style="color:var(--yellow)">\u{1FA99} ${state.coins}</span></div>
        </div>
        <div class="qheader">
          <h2>Question ${state.currentQuestion + 1} of ${state.runQuestions.length}</h2>
          ${streakHtml}
        </div>
        <div class="qbox">${esc(q.question)}</div>
        <div class="options">${optionsHtml}</div>
        ${submitRowHtml}
        ${explainHtml}
      </div>
    `;

    document.querySelectorAll('.opt').forEach(btn => {
      btn.addEventListener('click', () => selectOption(parseInt(btn.getAttribute('data-idx'), 10)));
    });
    const submitBtn = document.getElementById('submitBtn');
    if (submitBtn) submitBtn.addEventListener('click', submitAnswer);
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn) nextBtn.addEventListener('click', nextQuestion);
    const homeBtn = document.getElementById('homeBtn');
    if (homeBtn) homeBtn.addEventListener('click', goHome);
  }

  render();
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
